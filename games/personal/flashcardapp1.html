<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Practice</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        #root {
            width: 100%;
            height: 100%;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        .slide-in {
            animation: slideIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Vocabulary decks
        const vocabularyDecks = {
            polish: {
                name: 'Polish',
                flag: '🇵🇱',
                words: [
                    { word: 'dzień', translation: 'day' },
                    { word: 'noc', translation: 'night' },
                    { word: 'słońce', translation: 'sun' },
                    { word: 'księżyc', translation: 'moon' },
                    { word: 'gwiazda', translation: 'star' },
                    { word: 'woda', translation: 'water' },
                    { word: 'las', translation: 'forest' },
                    { word: 'góra', translation: 'mountain' },
                    { word: 'dom', translation: 'house' },
                    { word: 'okno', translation: 'window' }
                ]
            },
            japanese: {
                name: 'Japanese',
                flag: '🇯🇵',
                words: [
                    { word: '水', translation: 'water' },
                    { word: '火', translation: 'fire' },
                    { word: '土', translation: 'earth' },
                    { word: '木', translation: 'tree' },
                    { word: '金', translation: 'gold' },
                    { word: '空', translation: 'sky' },
                    { word: '雨', translation: 'rain' },
                    { word: '風', translation: 'wind' },
                    { word: '猫', translation: 'cat' },
                    { word: '犬', translation: 'dog' }
                ]
            },
            tagalog: {
                name: 'Tagalog',
                flag: '🇵🇭',
                words: [
                    { word: 'araw', translation: 'day' },
                    { word: 'gabi', translation: 'night' },
                    { word: 'araw-araw', translation: 'daily' },
                    { word: 'bahay', translation: 'house' },
                    { word: 'pamilya', translation: 'family' },
                    { word: 'puso', translation: 'heart' },
                    { word: 'kaibigan', translation: 'friend' },
                    { word: 'pag-ibig', translation: 'love' },
                    { word: 'langit', translation: 'sky' },
                    { word: 'dagat', translation: 'sea' }
                ]
            }
        };

        const HomePage = ({ onSelectDeck }) => {
            return (
                <div style={{
                    width: '100%',
                    height: '100vh',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '2rem',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                }}>
                    <h1 style={{
                        fontSize: '3.5rem',
                        fontWeight: 'bold',
                        color: 'white',
                        marginBottom: '1rem',
                        textShadow: '0 4px 15px rgba(0,0,0,0.3)',
                        animation: 'fadeIn 0.8s ease-out'
                    }}>
                        Polyglot
                    </h1>
                    <p style={{
                        fontSize: '1.25rem',
                        color: 'rgba(255,255,255,0.9)',
                        marginBottom: '3rem',
                        animation: 'fadeIn 1s ease-out',
                        animationDelay: '0.1s'
                    }}>
                        Choose a language to practice
                    </p>
                    
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))',
                        gap: '2rem',
                        maxWidth: '800px',
                        width: '100%'
                    }}>
                        {Object.entries(vocabularyDecks).map(([key, deck], index) => (
                            <button
                                key={key}
                                onClick={() => onSelectDeck(key)}
                                style={{
                                    backgroundColor: 'white',
                                    border: 'none',
                                    borderRadius: '1rem',
                                    padding: '2rem',
                                    cursor: 'pointer',
                                    transition: 'all 0.3s ease',
                                    boxShadow: '0 10px 30px rgba(0,0,0,0.2)',
                                    animation: `fadeIn 0.6s ease-out ${0.1 * (index + 1)}s backwards`,
                                    fontSize: '1.125rem',
                                    fontWeight: '600',
                                    color: '#333'
                                }}
                                onMouseOver={(e) => {
                                    e.currentTarget.style.transform = 'translateY(-8px)';
                                    e.currentTarget.style.boxShadow = '0 15px 40px rgba(0,0,0,0.3)';
                                }}
                                onMouseOut={(e) => {
                                    e.currentTarget.style.transform = 'translateY(0)';
                                    e.currentTarget.style.boxShadow = '0 10px 30px rgba(0,0,0,0.2)';
                                }}
                            >
                                <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>
                                    {deck.flag}
                                </div>
                                <div>{deck.name}</div>
                                <div style={{
                                    fontSize: '0.875rem',
                                    color: '#666',
                                    marginTop: '0.5rem'
                                }}>
                                    {deck.words.length} words
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const ModeSelectionPage = ({ deckKey, onSelectMode, onBack }) => {
            const deck = vocabularyDecks[deckKey];
            
            const modes = [
                { 
                    id: 'multiple-choice', 
                    name: 'Multiple Choice',
                    description: 'Select the correct answer from 4 options',
                    icon: '🎯'
                },
                { 
                    id: 'type-answer', 
                    name: 'Type the Answer',
                    description: 'Type the correct translation',
                    icon: '⌨️'
                },
                { 
                    id: 'handwrite', 
                    name: 'Write by Hand',
                    description: 'Draw your answer and verify it yourself',
                    icon: '✏️'
                },
                { 
                    id: 'penguin-game', 
                    name: 'Penguin Game',
                    description: 'Match words in an interactive game',
                    icon: '🐧'
                }
            ];

            return (
                <div style={{
                    width: '100%',
                    height: '100vh',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '2rem',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                }}>
                    <button
                        onClick={onBack}
                        style={{
                            position: 'absolute',
                            top: '2rem',
                            left: '2rem',
                            backgroundColor: 'rgba(255,255,255,0.2)',
                            border: 'none',
                            color: 'white',
                            padding: '0.5rem 1rem',
                            borderRadius: '0.5rem',
                            cursor: 'pointer',
                            fontSize: '1rem',
                            fontWeight: '600',
                            transition: 'all 0.3s ease'
                        }}
                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.3)'}
                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.2)'}
                    >
                        ← Back
                    </button>

                    <div style={{ marginBottom: '2rem', textAlign: 'center' }}>
                        <h1 style={{
                            fontSize: '2.5rem',
                            fontWeight: 'bold',
                            color: 'white',
                            textShadow: '0 4px 15px rgba(0,0,0,0.3)'
                        }}>
                            {deck.flag} {deck.name}
                        </h1>
                        <p style={{
                            color: 'rgba(255,255,255,0.9)',
                            fontSize: '1.125rem',
                            marginTop: '0.5rem'
                        }}>
                            Choose a practice mode
                        </p>
                    </div>
                    
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))',
                        gap: '2rem',
                        maxWidth: '1000px',
                        width: '100%'
                    }}>
                        {modes.map((mode, index) => (
                            <button
                                key={mode.id}
                                onClick={() => onSelectMode(mode.id)}
                                style={{
                                    backgroundColor: 'white',
                                    border: 'none',
                                    borderRadius: '1rem',
                                    padding: '2rem',
                                    cursor: 'pointer',
                                    transition: 'all 0.3s ease',
                                    boxShadow: '0 10px 30px rgba(0,0,0,0.2)',
                                    animation: `fadeIn 0.6s ease-out ${0.1 * (index + 1)}s backwards`,
                                    display: 'flex',
                                    flexDirection: 'column',
                                    alignItems: 'center',
                                    textAlign: 'center'
                                }}
                                onMouseOver={(e) => {
                                    e.currentTarget.style.transform = 'translateY(-8px)';
                                    e.currentTarget.style.boxShadow = '0 15px 40px rgba(0,0,0,0.3)';
                                }}
                                onMouseOut={(e) => {
                                    e.currentTarget.style.transform = 'translateY(0)';
                                    e.currentTarget.style.boxShadow = '0 10px 30px rgba(0,0,0,0.2)';
                                }}
                            >
                                <div style={{ fontSize: '2.5rem', marginBottom: '1rem' }}>
                                    {mode.icon}
                                </div>
                                <div style={{
                                    fontSize: '1.125rem',
                                    fontWeight: '600',
                                    color: '#333',
                                    marginBottom: '0.5rem'
                                }}>
                                    {mode.name}
                                </div>
                                <div style={{
                                    fontSize: '0.875rem',
                                    color: '#666'
                                }}>
                                    {mode.description}
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };
            // MultipleChoiceMode
               const MultipleChoiceMode = ({ deckKey, onBack }) => {
            const deck = vocabularyDecks[deckKey];
            
            // Helper to shuffle any array
            const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        
            // Initial State
            const [queue, setQueue] = useState(() => shuffle(deck.words));
            const [currentIndex, setCurrentIndex] = useState(0);
            const [wrongAttempts, setWrongAttempts] = useState(0);
            const [firstTryCorrect, setFirstTryCorrect] = useState(0);
            const [hasAttemptedCurrent, setHasAttemptedCurrent] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isFinished, setIsFinished] = useState(false);
        
            const currentWord = queue[currentIndex];
        
            // Generate options once per card
            const options = useMemo(() => {
                if (!currentWord) return [];
                let choices = [currentWord.translation];
                let distractors = deck.words
                    .filter(w => w.word !== currentWord.word)
                    .map(w => w.translation);
                
                choices.push(...shuffle(distractors).slice(0, 3));
                return shuffle(choices);
            }, [currentWord, deck.words]);
        
            const handleAnswer = (choice) => {
                if (selectedAnswer) return; // Prevent double clicking
                setSelectedAnswer(choice);
        
                if (choice === currentWord.translation) {
                    // CORRECT
                    if (!hasAttemptedCurrent) {
                        setFirstTryCorrect(prev => prev + 1);
                    }
                    
                    setTimeout(() => {
                        if (currentIndex < queue.length - 1) {
                            setCurrentIndex(prev => prev + 1);
                            setSelectedAnswer(null);
                            setHasAttemptedCurrent(false);
                        } else {
                            setIsFinished(true);
                        }
                    }, 1000);
                } else {
                    // INCORRECT
                    setWrongAttempts(prev => prev + 1);
                    setHasAttemptedCurrent(true);
                    
                    // Add this word to the end of the queue
                    setQueue(prev => [...prev, currentWord]);
                    
                    setTimeout(() => {
                        setSelectedAnswer(null);
                        setCurrentIndex(prev => prev + 1);
                        setHasAttemptedCurrent(false);
                    }, 1000);
                }
            };
        
            if (isFinished) {
                return (
                    <div style={{ padding: '2rem', textAlign: 'center', color: 'white' }}>
                        <h2>Round Complete!</h2>
                        <p style={{ fontSize: '1.5rem' }}>
                            Score: <strong>{firstTryCorrect} / {deck.words.length}</strong>
                        </p>
                        <p>Total mistakes: {wrongAttempts}</p>
                        <button onClick={onBack} style={buttonStyle}>Back to Menu</button>
                    </div>
                );
            }
        
            return (
                <div style={{ padding: '2rem', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <div style={{ color: 'white', marginBottom: '1rem' }}>
                        Progress: {currentIndex + 1} / {queue.length}
                    </div>
        
                    <div style={cardStyle}>
                        <h1 style={{ fontSize: '3rem', margin: '1rem 0' }}>{currentWord.word}</h1>
                        
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', width: '100%' }}>
                            {options.map((option, i) => (
                                <button
                                    key={i}
                                    onClick={() => handleAnswer(option)}
                                    style={{
                                        ...optionStyle,
                                        backgroundColor: selectedAnswer === option 
                                            ? (option === currentWord.translation ? '#10b981' : '#ef4444')
                                            : 'white'
                                    }}
                                >
                                    {option}
                                </button>
                            ))}
                        </div>
                    </div>
        
                    <button onClick={onBack} style={{ ...buttonStyle, position: 'absolute', bottom: '2rem', left: '2rem' }}>
                        ← Back
                    </button>
                </div>
            );
        };
        
        // Simple Styles
        const cardStyle = {
            backgroundColor: 'white',
            padding: '2rem',
            borderRadius: '1rem',
            width: '100%',
            maxWidth: '400px',
            textAlign: 'center',
            boxShadow: '0 10px 25px rgba(0,0,0,0.2)'
        };
        
        const optionStyle = {
            padding: '1rem',
            border: '2px solid #ddd',
            borderRadius: '0.5rem',
            cursor: 'pointer',
            fontSize: '1rem',
            fontWeight: 'bold',
            transition: '0.2s'
        };
        
        const buttonStyle = {
            padding: '0.5rem 1rem',
            backgroundColor: 'rgba(255,255,255,0.2)',
            color: 'white',
            border: 'none',
            borderRadius: '0.5rem',
            cursor: 'pointer'
        };
        // Type Answer Mode
        const TypeAnswerMode = ({ deckKey, onBack }) => {
            const deck = vocabularyDecks[deckKey];
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [inputValue, setInputValue] = useState('');
            const [answered, setAnswered] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [completed, setCompleted] = useState(false);

            const currentWord = deck.words[currentIndex];
            const showingWord = Math.random() > 0.5;

            const handleSubmit = () => {
                const userAnswer = inputValue.trim().toLowerCase();
                const correctAnswer = (showingWord ? currentWord.translation : currentWord.word).toLowerCase();
                const correct = userAnswer === correctAnswer;
                
                setAnswered(true);
                setIsCorrect(correct);
                if (correct) {
                    setScore(score + 1);
                }
            };

            const handleNext = () => {
                if (currentIndex < deck.words.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setInputValue('');
                    setAnswered(false);
                    setIsCorrect(null);
                } else {
                    setCompleted(true);
                }
            };

            if (completed) {
                return (
                    <div style={{
                        width: '100%',
                        height: '100vh',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                        padding: '2rem'
                    }}>
                        <div style={{
                            backgroundColor: 'white',
                            borderRadius: '1.5rem',
                            padding: '3rem',
                            textAlign: 'center',
                            boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
                            maxWidth: '500px',
                            animation: 'fadeIn 0.6s ease-out'
                        }}>
                            <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>
                                {score === deck.words.length ? '🎉' : '✨'}
                            </div>
                            <h2 style={{
                                fontSize: '2rem',
                                fontWeight: 'bold',
                                marginBottom: '1rem',
                                color: '#333'
                            }}>
                                Completed!
                            </h2>
                            <p style={{
                                fontSize: '1.25rem',
                                marginBottom: '2rem',
                                color: '#666'
                            }}>
                                You scored <strong>{score}/{deck.words.length}</strong>
                            </p>
                            <button
                                onClick={onBack}
                                style={{
                                    backgroundColor: '#667eea',
                                    color: 'white',
                                    border: 'none',
                                    padding: '0.75rem 2rem',
                                    borderRadius: '0.5rem',
                                    cursor: 'pointer',
                                    fontSize: '1rem',
                                    fontWeight: '600',
                                    transition: 'all 0.3s ease'
                                }}
                                onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#764ba2'}
                                onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#667eea'}
                            >
                                Back to Modes
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{
                    width: '100%',
                    height: '100vh',
                    display: 'flex',
                    flexDirection: 'column',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    padding: '2rem'
                }}>
                    <button
                        onClick={onBack}
                        style={{
                            position: 'absolute',
                            top: '2rem',
                            left: '2rem',
                            backgroundColor: 'rgba(255,255,255,0.2)',
                            border: 'none',
                            color: 'white',
                            padding: '0.5rem 1rem',
                            borderRadius: '0.5rem',
                            cursor: 'pointer',
                            fontSize: '1rem',
                            fontWeight: '600',
                            transition: 'all 0.3s ease'
                        }}
                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.3)'}
                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.2)'}
                    >
                        ← Back
                    </button>

                    <div style={{
                        position: 'absolute',
                        top: '2rem',
                        right: '2rem',
                        color: 'white',
                        fontSize: '1.125rem',
                        fontWeight: '600'
                    }}>
                        {currentIndex + 1}/{deck.words.length} | Score: {score}
                    </div>

                    <div style={{
                        flex: 1,
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}>
                        <div style={{
                            backgroundColor: 'white',
                            borderRadius: '1.5rem',
                            padding: '3rem',
                            maxWidth: '600px',
                            width: '100%',
                            boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
                            animation: 'fadeIn 0.6s ease-out'
                        }}>
                            <p style={{
                                color: '#666',
                                fontSize: '0.875rem',
                                marginBottom: '1rem',
                                textTransform: 'uppercase',
                                letterSpacing: '0.05em'
                            }}>
                                {showingWord ? 'Translate to English' : 'Identify the translation'}
                            </p>
                            
                            <h2 style={{
                                fontSize: '2.5rem',
                                fontWeight: 'bold',
                                marginBottom: '2rem',
                                color: '#333',
                                textAlign: 'center'
                            }}>
                                {showingWord ? currentWord.word : currentWord.translation}
                            </h2>

                            <input
                                type="text"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && !answered && handleSubmit()}
                                placeholder="Type your answer..."
                                disabled={answered}
                                style={{
                                    width: '100%',
                                    padding: '1rem',
                                    borderRadius: '0.75rem',
                                    border: '2px solid #ddd',
                                    fontSize: '1rem',
                                    marginBottom: '1.5rem',
                                    transition: 'all 0.3s ease',
                                    backgroundColor: answered ? (isCorrect ? '#d1fae5' : '#fee2e2') : 'white',
                                    borderColor: answered ? (isCorrect ? '#10b981' : '#ef4444') : '#ddd'
                                }}
                            />

                            {answered && (
                                <div style={{
                                    backgroundColor: isCorrect ? '#d1fae5' : '#fee2e2',
                                    color: isCorrect ? '#065f46' : '#991b1b',
                                    padding: '1rem',
                                    borderRadius: '0.75rem',
                                    marginBottom: '1.5rem',
                                    textAlign: 'center',
                                    fontWeight: '600',
                                    animation: 'fadeIn 0.3s ease-out'
                                }}>
                                    {isCorrect ? '✓ Correct!' : '✗ Incorrect'}
                                    <div style={{ fontSize: '0.875rem', marginTop: '0.5rem' }}>
                                        Correct answer: <strong>{showingWord ? currentWord.translation : currentWord.word}</strong>
                                    </div>
                                </div>
                            )}

                            <div style={{
                                display: 'flex',
                                gap: '1rem'
                            }}>
                                {!answered && (
                                    <button
                                        onClick={handleSubmit}
                                        disabled={!inputValue.trim()}
                                        style={{
                                            flex: 1,
                                            padding: '1rem',
                                            backgroundColor: inputValue.trim() ? '#667eea' : '#ccc',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '0.75rem',
                                            cursor: inputValue.trim() ? 'pointer' : 'default',
                                            fontSize: '1rem',
                                            fontWeight: '600',
                                            transition: 'all 0.3s ease'
                                        }}
                                        onMouseOver={(e) => {
                                            if (inputValue.trim()) {
                                                e.currentTarget.style.backgroundColor = '#764ba2';
                                            }
                                        }}
                                        onMouseOut={(e) => {
                                            if (inputValue.trim()) {
                                                e.currentTarget.style.backgroundColor = '#667eea';
                                            }
                                        }}
                                    >
                                        Submit
                                    </button>
                                )}
                                {answered && (
                                    <button
                                        onClick={handleNext}
                                        style={{
                                            flex: 1,
                                            padding: '1rem',
                                            backgroundColor: '#667eea',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '0.75rem',
                                            cursor: 'pointer',
                                            fontSize: '1rem',
                                            fontWeight: '600',
                                            transition: 'all 0.3s ease',
                                            animation: 'fadeIn 0.3s ease-out'
                                        }}
                                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#764ba2'}
                                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#667eea'}
                                    >
                                        {currentIndex < deck.words.length - 1 ? 'Next' : 'Finish'}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Handwriting Mode
        const HandwriteMode = ({ deckKey, onBack }) => {
            const deck = vocabularyDecks[deckKey];
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [completed, setCompleted] = useState(false);
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasDrawn, setHasDrawn] = useState(false);
            const [userResponse, setUserResponse] = useState(null);

            const currentWord = deck.words[currentIndex];
            const showingWord = Math.random() > 0.5;

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;

                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            }, [currentIndex]);

            const handleMouseDown = (e) => {
                setIsDrawing(true);
                setHasDrawn(true);
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const handleMouseMove = (e) => {
                if (!isDrawing) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const handleMouseUp = () => {
                setIsDrawing(false);
            };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                setHasDrawn(false);
                setUserResponse(null);
            };

            const handleCheckAnswer = (correct) => {
                setUserResponse(correct);
                if (correct) {
                    setScore(score + 1);
                }
            };

            const handleNext = () => {
                if (currentIndex < deck.words.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setUserResponse(null);
                    setHasDrawn(false);
                } else {
                    setCompleted(true);
                }
            };

            if (completed) {
                return (
                    <div style={{
                        width: '100%',
                        height: '100vh',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                        padding: '2rem'
                    }}>
                        <div style={{
                            backgroundColor: 'white',
                            borderRadius: '1.5rem',
                            padding: '3rem',
                            textAlign: 'center',
                            boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
                            maxWidth: '500px',
                            animation: 'fadeIn 0.6s ease-out'
                        }}>
                            <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>
                                {score === deck.words.length ? '🎉' : '✨'}
                            </div>
                            <h2 style={{
                                fontSize: '2rem',
                                fontWeight: 'bold',
                                marginBottom: '1rem',
                                color: '#333'
                            }}>
                                Completed!
                            </h2>
                            <p style={{
                                fontSize: '1.25rem',
                                marginBottom: '2rem',
                                color: '#666'
                            }}>
                                You scored <strong>{score}/{deck.words.length}</strong>
                            </p>
                            <button
                                onClick={onBack}
                                style={{
                                    backgroundColor: '#667eea',
                                    color: 'white',
                                    border: 'none',
                                    padding: '0.75rem 2rem',
                                    borderRadius: '0.5rem',
                                    cursor: 'pointer',
                                    fontSize: '1rem',
                                    fontWeight: '600',
                                    transition: 'all 0.3s ease'
                                }}
                                onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#764ba2'}
                                onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#667eea'}
                            >
                                Back to Modes
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{
                    width: '100%',
                    height: '100vh',
                    display: 'flex',
                    flexDirection: 'column',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    padding: '2rem'
                }}>
                    <button
                        onClick={onBack}
                        style={{
                            position: 'absolute',
                            top: '2rem',
                            left: '2rem',
                            backgroundColor: 'rgba(255,255,255,0.2)',
                            border: 'none',
                            color: 'white',
                            padding: '0.5rem 1rem',
                            borderRadius: '0.5rem',
                            cursor: 'pointer',
                            fontSize: '1rem',
                            fontWeight: '600',
                            transition: 'all 0.3s ease'
                        }}
                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.3)'}
                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.2)'}
                    >
                        ← Back
                    </button>

                    <div style={{
                        position: 'absolute',
                        top: '2rem',
                        right: '2rem',
                        color: 'white',
                        fontSize: '1.125rem',
                        fontWeight: '600'
                    }}>
                        {currentIndex + 1}/{deck.words.length} | Score: {score}
                    </div>

                    <div style={{
                        flex: 1,
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}>
                        <div style={{
                            backgroundColor: 'white',
                            borderRadius: '1.5rem',
                            padding: '2rem',
                            maxWidth: '800px',
                            width: '100%',
                            boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
                            animation: 'fadeIn 0.6s ease-out'
                        }}>
                            <p style={{
                                color: '#666',
                                fontSize: '0.875rem',
                                marginBottom: '1rem',
                                textTransform: 'uppercase',
                                letterSpacing: '0.05em'
                            }}>
                                {showingWord ? 'Write the English translation' : 'Write the word'}
                            </p>
                            
                            <h2 style={{
                                fontSize: '2.5rem',
                                fontWeight: 'bold',
                                marginBottom: '2rem',
                                color: '#333',
                                textAlign: 'center'
                            }}>
                                {showingWord ? currentWord.word : currentWord.translation}
                            </h2>

                            <canvas
                                ref={canvasRef}
                                onMouseDown={handleMouseDown}
                                onMouseMove={handleMouseMove}
                                onMouseUp={handleMouseUp}
                                onMouseLeave={handleMouseUp}
                                style={{
                                    border: '2px solid #ddd',
                                    borderRadius: '0.75rem',
                                    cursor: 'crosshair',
                                    display: 'block',
                                    width: '100%',
                                    height: '300px',
                                    marginBottom: '1.5rem',
                                    backgroundColor: 'white'
                                }}
                            />

                            <div style={{
                                display: 'flex',
                                gap: '1rem',
                                marginBottom: '1.5rem'
                            }}>
                                <button
                                    onClick={clearCanvas}
                                    style={{
                                        flex: 1,
                                        padding: '0.75rem',
                                        backgroundColor: '#ef4444',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: '0.75rem',
                                        cursor: 'pointer',
                                        fontSize: '1rem',
                                        fontWeight: '600',
                                        transition: 'all 0.3s ease'
                                    }}
                                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#dc2626'}
                                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#ef4444'}
                                >
                                    Clear
                                </button>
                                {hasDrawn && userResponse === null && (
                                    <button
                                        onClick={() => handleCheckAnswer(true)}
                                        style={{
                                            flex: 1,
                                            padding: '0.75rem',
                                            backgroundColor: '#10b981',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '0.75rem',
                                            cursor: 'pointer',
                                            fontSize: '1rem',
                                            fontWeight: '600',
                                            transition: 'all 0.3s ease'
                                        }}
                                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#059669'}
                                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#10b981'}
                                    >
                                        ✓ I got it right!
                                    </button>
                                )}
                                {hasDrawn && userResponse === null && (
                                    <button
                                        onClick={() => handleCheckAnswer(false)}
                                        style={{
                                            flex: 1,
                                            padding: '0.75rem',
                                            backgroundColor: '#ef4444',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '0.75rem',
                                            cursor: 'pointer',
                                            fontSize: '1rem',
                                            fontWeight: '600',
                                            transition: 'all 0.3s ease'
                                        }}
                                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#dc2626'}
                                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#ef4444'}
                                    >
                                        ✗ I got it wrong
                                    </button>
                                )}
                            </div>

                            {userResponse !== null && (
                                <div style={{
                                    backgroundColor: userResponse ? '#d1fae5' : '#fee2e2',
                                    color: userResponse ? '#065f46' : '#991b1b',
                                    padding: '1rem',
                                    borderRadius: '0.75rem',
                                    marginBottom: '1.5rem',
                                    textAlign: 'center',
                                    fontWeight: '600',
                                    animation: 'fadeIn 0.3s ease-out'
                                }}>
                                    {userResponse ? '✓ Great job!' : 'Better luck next time!'}
                                    <div style={{ fontSize: '0.875rem', marginTop: '0.5rem' }}>
                                        The answer was: <strong>{showingWord ? currentWord.translation : currentWord.word}</strong>
                                    </div>
                                </div>
                            )}

                            {userResponse !== null && (
                                <button
                                    onClick={handleNext}
                                    style={{
                                        width: '100%',
                                        padding: '1rem',
                                        backgroundColor: '#667eea',
                                        color: 'white',
                                        border: 'none',
                                        borderRadius: '0.75rem',
                                        cursor: 'pointer',
                                        fontSize: '1rem',
                                        fontWeight: '600',
                                        transition: 'all 0.3s ease',
                                        animation: 'fadeIn 0.3s ease-out'
                                    }}
                                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#764ba2'}
                                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#667eea'}
                                >
                                    {currentIndex < deck.words.length - 1 ? 'Next' : 'Finish'}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Penguin Game Mode (integrated from original code)
        const PenguinGameMode = ({ deckKey, onBack }) => {
            const deck = vocabularyDecks[deckKey];
            const [drops, setDrops] = useState([]);
            const [score, setScore] = useState(0);
            const [misses, setMisses] = useState(0);
            const [selectedDrop, setSelectedDrop] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [gameWon, setGameWon] = useState(false);
            const [penguinPos, setPenguinPos] = useState(10);
            const [penguinDirection, setPenguinDirection] = useState(1);
            const dropIdRef = useRef(0);
            const spawnTimerRef = useRef(null);
            const checkTimerRef = useRef(null);

            const createDrop = (type = null, matchIndex = null, existingDrops = []) => {
                let text, dropType, matchData;
                const index = matchIndex !== null ? matchIndex : Math.floor(Math.random() * deck.words.length);

                if (type === 'word' || (!type && Math.random() > 0.5)) {
                    text = deck.words[index].word;
                    dropType = 'word';
                    matchData = { index };
                } else {
                    text = deck.words[index].translation;
                    dropType = 'translation';
                    matchData = { index };
                }

                const position = findValidPosition(existingDrops, 15);

                return {
                    id: dropIdRef.current++,
                    text,
                    type: dropType,
                    matchData,
                    x: position.x,
                    y: position.y,
                    selected: false
                };
            };

            const getCurrentSpeed = () => {
                const speedIncrease = Math.floor(score / 10) * 0.03;
                return 0.12 + speedIncrease;
            };

            const getSpawnInterval = () => {
                if (score < 30) {
                    return 5000;
                }
                const level = Math.floor((score - 30) / 10);
                return Math.max(1600, 4000 - (level * 300));
            };

            const isPositionTooClose = (x, y, existingDrops, minDistance = 15) => {
                return existingDrops.some(drop => {
                    const distance = Math.sqrt(Math.pow(drop.x - x, 2) + Math.pow(drop.y - y, 2));
                    return distance < minDistance;
                });
            };

            const findValidPosition = (existingDrops, minDistance = 15) => {
                let attempts = 0;
                let x, y;
                do {
                    x = Math.random() * 70 + 10;
                    y = -10 - Math.random() * 20;
                    attempts++;
                } while (isPositionTooClose(x, y, existingDrops, minDistance) && attempts < 100);
                return { x, y };
            };

            const hasMatchingPair = (drop, allDrops) => {
                return allDrops.some(otherDrop => {
                    if (otherDrop.id === drop.id) return false;
                    if (drop.type === otherDrop.type) return false;
                    return drop.matchData.index === otherDrop.matchData.index;
                });
            };

            const ensureMatchExists = () => {
                setDrops(prev => {
                    const dropsAtHalf = prev.filter(d => d.y >= 50 && d.y < 55);
                    
                    for (let drop of dropsAtHalf) {
                        if (!hasMatchingPair(drop, prev)) {
                            const matchType = drop.type === 'word' ? 'translation' : 'word';
                            const matchDrop = createDrop(matchType, drop.matchData.index, prev);
                            return [...prev, matchDrop];
                        }
                    }
                    return prev;
                });
            };

            useEffect(() => {
                if (gameOver || gameWon) return;

                const moveInterval = setInterval(() => {
                    setPenguinPos(prev => {
                        const next = prev + penguinDirection * 1.2;
                        if (next > 90 || next < 10) {
                            setPenguinDirection(d => -d);
                            return prev;
                        }
                        return next;
                    });
                }, 50);

                return () => clearInterval(moveInterval);
            }, [gameOver, gameWon, penguinDirection]);

            useEffect(() => {
                if (gameOver || gameWon) return;

                let firstDropRef = null;

                const spawnDrop = () => {
                    setDrops(prev => {
                        const newDrop = createDrop(null, null, prev);
                        firstDropRef = newDrop;
                        return [...prev, newDrop];
                    });
                    
                    setTimeout(() => {
                        setDrops(prev => {
                            if (!firstDropRef) return prev;
                            const matchType = firstDropRef.type === 'word' ? 'translation' : 'word';
                            const matchDrop = createDrop(matchType, firstDropRef.matchData.index, prev);
                            firstDropRef = null;
                            return [...prev, matchDrop];
                        });
                    }, 1000 + Math.random() * 2000);
                };

                spawnDrop();
                spawnTimerRef.current = setInterval(spawnDrop, getSpawnInterval());

                return () => {
                    if (spawnTimerRef.current) clearInterval(spawnTimerRef.current);
                };
            }, [gameOver, gameWon, score]);

            useEffect(() => {
                if (gameOver || gameWon) return;

                checkTimerRef.current = setInterval(ensureMatchExists, 100);

                return () => {
                    if (checkTimerRef.current) clearInterval(checkTimerRef.current);
                };
            }, [gameOver, gameWon, drops]);

            useEffect(() => {
                if (gameOver || gameWon) return;

                const interval = setInterval(() => {
                    setDrops(prev => {
                        const updated = prev.map(drop => ({
                            ...drop,
                            y: drop.y + getCurrentSpeed()
                        }));

                        const landed = updated.filter(d => d.y >= 95);
                        if (landed.length > 0) {
                            setMisses(m => {
                                const newMisses = m + landed.length;
                                if (newMisses >= 3) {
                                    setGameOver(true);
                                    if (spawnTimerRef.current) clearInterval(spawnTimerRef.current);
                                }
                                return newMisses;
                            });
                            return updated.filter(d => d.y < 95);
                        }

                        return updated;
                    });
                }, 50);

                return () => clearInterval(interval);
            }, [gameOver, gameWon, score]);

            const handleDropClick = (drop) => {
                if (gameOver || gameWon) return;

                if (!selectedDrop) {
                    setSelectedDrop(drop);
                    setDrops(prev => prev.map(d => 
                        d.id === drop.id ? { ...d, selected: true } : d
                    ));
                } else {
                    if (selectedDrop.id === drop.id) {
                        setSelectedDrop(null);
                        setDrops(prev => prev.map(d => 
                            d.id === drop.id ? { ...d, selected: false } : d
                        ));
                        return;
                    }

                    if (selectedDrop.type === drop.type) {
                        setSelectedDrop(drop);
                        setDrops(prev => prev.map(d => {
                            if (d.id === drop.id) return { ...d, selected: true };
                            if (d.id === selectedDrop.id) return { ...d, selected: false };
                            return d;
                        }));
                        return;
                    }

                    if (selectedDrop.matchData.index === drop.matchData.index) {
                        setDrops(prev => prev.filter(d => 
                            d.id !== selectedDrop.id && d.id !== drop.id
                        ));
                        setScore(s => {
                            const newScore = s + 1;
                            if (newScore >= 100) {
                                setGameWon(true);
                                if (spawnTimerRef.current) clearInterval(spawnTimerRef.current);
                            }
                            return newScore;
                        });
                        setSelectedDrop(null);
                    } else {
                        setSelectedDrop(null);
                        setDrops(prev => prev.map(d => ({ ...d, selected: false })));
                    }
                }
            };

            const Penguin = () => (
                <svg width="140" height="120" viewBox="0 0 140 120" style={{ transform: penguinDirection === 1 ? 'scaleX(1)' : 'scaleX(-1)' }}>
                    <ellipse cx="70" cy="112" rx="30" ry="6" fill="#000" opacity="0.2" />
                    <ellipse cx="70" cy="75" rx="35" ry="42" fill="#2c3e50" />
                    <ellipse cx="72" cy="78" rx="26" ry="35" fill="#ecf0f1" />
                    <ellipse cx="45" cy="65" rx="8" ry="22" fill="#2c3e50" />
                    <ellipse cx="85" cy="50" rx="18" ry="16" fill="#2c3e50" />
                    <ellipse cx="88" cy="52" rx="14" ry="12" fill="#ecf0f1" />
                    <circle cx="92" cy="50" r="6" fill="#000" />
                    <circle cx="93" cy="49" r="2" fill="#fff" />
                    <path d="M 100 58 L 108 60 L 106 64 L 100 62 Z" fill="#ff8c42" />
                    <path d="M 102 60 L 106 61 L 105 63 L 102 62 Z" fill="#ffa500" />
                    <ellipse cx="58" cy="105" rx="16" ry="8" fill="#ff8c42" style={{ animation: 'bounce 0.4s ease-in-out infinite' }} />
                    <path d="M 50 105 L 45 110 L 52 108 Z" fill="#ffa500" />
                    <path d="M 58 105 L 54 110 L 60 108 Z" fill="#ffa500" />
                    <path d="M 66 105 L 63 110 L 68 108 Z" fill="#ffa500" />
                    <ellipse cx="82" cy="105" rx="16" ry="8" fill="#ff8c42" style={{ animation: 'bounce 0.4s ease-in-out infinite 0.2s' }} />
                    <path d="M 74 105 L 69 110 L 76 108 Z" fill="#ffa500" />
                    <path d="M 82 105 L 78 110 L 84 108 Z" fill="#ffa500" />
                    <path d="M 90 105 L 87 110 L 92 108 Z" fill="#ffa500" />
                    <ellipse cx="72" cy="90" rx="8" ry="10" fill="#fff" opacity="0.3" />
                </svg>
            );

            return (
                <div style={{
                    width: '100%',
                    height: '100vh',
                    background: 'linear-gradient(to bottom, #475569, #64748b, #6b7280)',
                    position: 'relative',
                    overflow: 'hidden'
                }}>
                    <button
                        onClick={onBack}
                        style={{
                            position: 'absolute',
                            bottom: '2rem',
                            left: '2rem',
                            backgroundColor: 'rgba(255,255,255,0.2)',
                            border: 'none',
                            color: 'white',
                            padding: '0.5rem 1rem',
                            borderRadius: '0.5rem',
                            cursor: 'pointer',
                            fontSize: '1rem',
                            fontWeight: '600',
                            transition: 'all 0.3s ease',
                            zIndex: 100
                        }}
                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.3)'}
                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.2)'}
                    >
                        ← Back
                    </button>

                    <div style={{
                        position: 'absolute',
                        top: '2rem',
                        left: '1rem',
                        color: 'white',
                        fontSize: '1.25rem',
                        fontWeight: 'bold',
                        backgroundColor: 'rgba(0,0,0,0.5)',
                        padding: '0.5rem 1rem',
                        borderRadius: '0.5rem',
                        zIndex: 50
                    }}>
                        Score: {score}/100
                    </div>
                    <div style={{
                        position: 'absolute',
                        top: '1rem',
                        right: '1rem',
                        color: 'white',
                        fontSize: '1.25rem',
                        fontWeight: 'bold',
                        backgroundColor: 'rgba(0,0,0,0.5)',
                        padding: '0.5rem 1rem',
                        borderRadius: '0.5rem',
                        zIndex: 50
                    }}>
                        Misses: {misses}/3
                    </div>

                    {drops.map(drop => (
                        <div
                            key={drop.id}
                            onClick={() => handleDropClick(drop)}
                            style={{
                                position: 'absolute',
                                cursor: 'pointer',
                                transition: 'all 0.2s',
                                left: `${drop.x}%`,
                                top: `${drop.y}%`,
                                transform: `translate(-50%, -50%) scale(${drop.selected ? 1.1 : 1})`
                            }}
                            onMouseOver={(e) => {
                                if (!drop.selected) e.currentTarget.style.transform = `translate(-50%, -50%) scale(1.05)`;
                            }}
                            onMouseOut={(e) => {
                                if (!drop.selected) e.currentTarget.style.transform = `translate(-50%, -50%) scale(1)`;
                            }}
                        >
                            <div style={{ position: 'relative', animation: drop.selected ? 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite' : 'none' }}>
                                <svg width="80" height="100" viewBox="0 0 80 100" style={{ filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.3))' }}>
                                    <path 
                                        d="M40 5 C20 25, 10 40, 10 60 C10 78, 23 92, 40 92 C57 92, 70 78, 70 60 C70 40, 60 25, 40 5 Z" 
                                        fill={drop.selected ? '#fbbf24' : '#60a5fa'}
                                        stroke={drop.selected ? '#f59e0b' : '#3b82f6'}
                                        strokeWidth="2"
                                    />
                                </svg>
                                <div style={{
                                    position: 'absolute',
                                    inset: 0,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '0.875rem',
                                    fontWeight: '900',
                                    color: 'white',
                                    textShadow: '2px 2px 4px rgba(0,0,0,0.8), -1px -1px 2px rgba(0,0,0,0.6)',
                                    fontFamily: 'Arial, sans-serif',
                                    letterSpacing: '0.5px',
                                    padding: '0 10px',
                                    textAlign: 'center'
                                }}>
                                    {drop.text}
                                </div>
                            </div>
                        </div>
                    ))}

                    <div style={{
                        position: 'absolute',
                        bottom: '2rem',
                        left: `${penguinPos}%`,
                        transform: 'translateX(-50%)',
                        transition: 'all 0.3s ease-linear'
                    }}>
                        <Penguin />
                    </div>

                    {(gameOver || gameWon) && (
                        <div style={{
                            position: 'absolute',
                            inset: 0,
                            backgroundColor: 'rgba(0,0,0,0.7)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            zIndex: 200
                        }}>
                            <div style={{
                                backgroundColor: 'white',
                                padding: '2rem',
                                borderRadius: '0.5rem',
                                textAlign: 'center'
                            }}>
                                <h2 style={{
                                    fontSize: '1.875rem',
                                    fontWeight: 'bold',
                                    marginBottom: '1rem'
                                }}>
                                    {gameWon ? 'Congratulations! 🎉' : 'Game Over! 😿'}
                                </h2>
                                <p style={{
                                    fontSize: '1.25rem',
                                    marginBottom: '1.5rem'
                                }}>
                                    {gameWon 
                                        ? 'You made it home safe!' 
                                        : 'The penguin doesn\'t like the rain!'}
                                </p>
                                <p style={{
                                    fontSize: '1.125rem',
                                    marginBottom: '1.5rem'
                                }}>
                                    Final Score: {score}/100
                                </p>
                                <button
                                    onClick={onBack}
                                    style={{
                                        backgroundColor: '#667eea',
                                        color: 'white',
                                        padding: '0.75rem 1.5rem',
                                        borderRadius: '0.5rem',
                                        border: 'none',
                                        cursor: 'pointer',
                                        transition: 'background-color 0.2s'
                                    }}
                                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#764ba2'}
                                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#667eea'}
                                >
                                    Back to Modes
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Main App Component
        const VocabApp = () => {
            const [page, setPage] = useState('home');
            const [selectedDeck, setSelectedDeck] = useState(null);

            const handleSelectDeck = (deckKey) => {
                setSelectedDeck(deckKey);
                setPage('modes');
            };

            const handleSelectMode = (modeId) => {
                setPage(modeId);
            };

            const handleBack = (destination = 'modes') => {
                if (destination === 'modes') {
                    setPage('modes');
                } else {
                    setSelectedDeck(null);
                    setPage('home');
                }
            };

            switch (page) {
                case 'home':
                    return <HomePage onSelectDeck={handleSelectDeck} />;
                case 'modes':
                    return <ModeSelectionPage deckKey={selectedDeck} onSelectMode={handleSelectMode} onBack={() => handleBack('home')} />;
                case 'multiple-choice':
                    return <MultipleChoiceMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'type-answer':
                    return <TypeAnswerMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'handwrite':
                    return <HandwriteMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'penguin-game':
                    return <PenguinGameMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                default:
                    return <HomePage onSelectDeck={handleSelectDeck} />;
            }
        };

        ReactDOM.render(<VocabApp />, document.getElementById('root'));
    </script>
</body>
</html>
