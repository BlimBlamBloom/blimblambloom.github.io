<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Practice</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        #root {
            width: 100%;
            height: 100%;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        .slide-in {
            animation: slideIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Vocabulary folders and decks
                const vocabularyFolders = {
            polish: {
                name: 'Polish',
                decks: {
                    polish1: {
                        name: 'Polish 1',
                        words: [
                            { word: 'dzień', translation: 'day' },
                            { word: 'noc', translation: 'night' },
                            { word: 'słońce', translation: 'sun' },
                            { word: 'księżyc', translation: 'moon' },
                            { word: 'gwiazda', translation: 'star' },
                            { word: 'woda', translation: 'water' },
                            { word: 'las', translation: 'forest' },
                            { word: 'góra', translation: 'mountain' },
                            { word: 'dom', translation: 'house' },
                            { word: 'okno', translation: 'window' }
                        ]
                    },
                    polish2: {
                        name: 'Polish 2',
                        words: [
                            { word: 'kot', translation: 'cat' },
                            { word: 'pies', translation: 'dog' },
                            { word: 'ptak', translation: 'bird' },
                            { word: 'ryba', translation: 'fish' },
                            { word: 'koń', translation: 'horse' },
                            { word: 'krowa', translation: 'cow' },
                            { word: 'owca', translation: 'sheep' },
                            { word: 'świnia', translation: 'pig' },
                            { word: 'mysz', translation: 'mouse' },
                            { word: 'zając', translation: 'rabbit' }
                        ]
                    }
                }
            },
            japanese: {
                name: 'Japanese',
                decks: {
                    japanese1: {
                        name: 'Japanese 1',
                        words: [
                            { word: '水', translation: 'water' },
                            { word: '火', translation: 'fire' },
                            { word: '土', translation: 'earth' },
                            { word: '木', translation: 'tree' },
                            { word: '金', translation: 'gold' },
                            { word: '空', translation: 'sky' },
                            { word: '雨', translation: 'rain' },
                            { word: '風', translation: 'wind' },
                            { word: '猫', translation: 'cat' },
                            { word: '犬', translation: 'dog' }
                        ]
                    }
                }
            },
            tagalog: {
                name: 'Tagalog',
                decks: {
                    tagalog1: {
                        name: 'Tagalog 1',
                        words: [
                            { word: 'araw', translation: 'day' },
                            { word: 'gabi', translation: 'night' },
                            { word: 'araw-araw', translation: 'daily' },
                            { word: 'bahay', translation: 'house' },
                            { word: 'pamilya', translation: 'family' },
                            { word: 'puso', translation: 'heart' },
                            { word: 'kaibigan', translation: 'friend' },
                            { word: 'pag-ibig', translation: 'love' },
                            { word: 'langit', translation: 'sky' },
                            { word: 'dagat', translation: 'sea' }
                        ]
                    }
                }
            }
        };
        
        // Helper: look up any deck by its key, across all folders
        const getDeck = (deckKey) => {
            for (const folder of Object.values(vocabularyFolders)) {
                if (folder.decks[deckKey]) return folder.decks[deckKey];
            }
            return null;
        };
        // 2. Shared Styles (Put them here!)
    const cardStyle = {
        backgroundColor: 'white',
        padding: '2rem',
        borderRadius: '1rem',
        width: '100%',
        maxWidth: '400px',
        textAlign: 'center',
        boxShadow: '0 10px 25px rgba(0,0,0,0.2)'
    };

    const optionStyle = {
        padding: '1rem',
        border: '2px solid #ddd',
        borderRadius: '0.5rem',
        cursor: 'pointer',
        fontSize: '1rem',
        fontWeight: 'bold',
        transition: '0.2s'
    };

    const HomePage = ({ onSelectDeck }) => {
                const [openFolder, setOpenFolder] = useState(null);
            
                return (
                    <div style={{
                        width: '100%',
                        minHeight: '100vh',
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        justifyContent: 'center',
                        padding: '2rem',
                        background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                    }}>
                        <h1 style={{
                            fontSize: '3.5rem',
                            fontWeight: 'bold',
                            color: 'white',
                            marginBottom: '0.5rem',
                            textShadow: '0 4px 15px rgba(0,0,0,0.3)'
                        }}>
                            Polyglot
                        </h1>
                        <p style={{
                            fontSize: '1.25rem',
                            color: 'rgba(255,255,255,0.9)',
                            marginBottom: '3rem'
                        }}>
                            Choose a language to practice
                        </p>
            
                        <div style={{
                            display: 'flex',
                            flexDirection: 'column',
                            gap: '1rem',
                            maxWidth: '600px',
                            width: '100%'
                        }}>
                            {Object.entries(vocabularyFolders).map(([folderKey, folder]) => (
                                <div key={folderKey}>
                                    {/* Folder button */}
                                    <button
                                        onClick={() => setOpenFolder(openFolder === folderKey ? null : folderKey)}
                                        style={{
                                            width: '100%',
                                            backgroundColor: 'white',
                                            border: 'none',
                                            borderRadius: openFolder === folderKey ? '1rem 1rem 0 0' : '1rem',
                                            padding: '1.25rem 1.75rem',
                                            cursor: 'pointer',
                                            display: 'flex',
                                            alignItems: 'center',
                                            justifyContent: 'space-between',
                                            boxShadow: '0 10px 30px rgba(0,0,0,0.2)',
                                            transition: 'all 0.2s ease'
                                        }}
                                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#f3f4f6'}
                                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'white'}
                                    >
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                                            <span style={{ fontSize: '1.75rem' }}>{folder.icon}</span>
                                            <span style={{ fontSize: '1.2rem', fontWeight: '700', color: '#333' }}>{folder.name}</span>
                                            <span style={{ fontSize: '0.85rem', color: '#888' }}>
                                                {Object.keys(folder.decks).length} deck{Object.keys(folder.decks).length !== 1 ? 's' : ''}
                                            </span>
                                        </div>
                                        <span style={{
                                            fontSize: '1.25rem',
                                            color: '#667eea',
                                            transform: openFolder === folderKey ? 'rotate(90deg)' : 'rotate(0deg)',
                                            transition: 'transform 0.2s ease'
                                        }}>▶</span>
                                    </button>
            
                                    {/* Deck list (shown when folder is open) */}
                                    {openFolder === folderKey && (
                                        <div style={{
                                            backgroundColor: 'rgba(255,255,255,0.15)',
                                            borderRadius: '0 0 1rem 1rem',
                                            overflow: 'hidden'
                                        }}>
                                            {Object.entries(folder.decks).map(([deckKey, deck]) => (
                                                <button
                                                    key={deckKey}
                                                    onClick={() => onSelectDeck(deckKey)}
                                                    style={{
                                                        width: '100%',
                                                        backgroundColor: 'transparent',
                                                        border: 'none',
                                                        borderTop: '1px solid rgba(255,255,255,0.2)',
                                                        padding: '1rem 1.75rem 1rem 3.5rem',
                                                        cursor: 'pointer',
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        justifyContent: 'space-between',
                                                        transition: 'background-color 0.2s ease'
                                                    }}
                                                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.2)'}
                                                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'transparent'}
                                                >
                                                    <span style={{ fontWeight: '600', color: 'white', fontSize: '1rem' }}>{deck.name}</span>
                                                    <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: '0.875rem' }}>{deck.words.length} words →</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

        const ModeSelectionPage = ({ deckKey, onSelectMode, onBack }) => {
            const deck = getDeck(deckKey);
            
            const modes = [
                { 
                    id: 'multiple-choice', 
                    name: 'Multiple Choice',
                    description: 'Select the correct answer from 4 options',
                    icon: '🎯'
                },
                { 
                    id: 'type-answer', 
                    name: 'Type the Answer',
                    description: 'Type the correct translation',
                    icon: '⌨️'
                },
                { 
                    id: 'handwrite', 
                    name: 'Write by Hand',
                    description: 'Draw your answer and verify it yourself',
                    icon: '✏️'
                },
                { 
                    id: 'penguin-game', 
                    name: 'Penguin Game',
                    description: 'Match words in an interactive game',
                    icon: '🐧'
                },
                { 
                    id: 'whack-a-mole', 
                    name: 'Whack-a-Mole',
                    description: 'Whack the mole with the correct translation',
                    icon: '🔨'
                },
                {
                    id: 'drum-machine',
                    name: 'Drum Machine',
                    description: 'Tap the correct translation on the beat',
                    icon: '🥁'
                },
                {
                    id: 'flappy-bird',
                    name: 'Flappy Bird',
                    description: 'Fly through the gap with the correct translation',
                    icon: '🐦'
                }
            ];

            return (
                <div style={{
                    width: '100%',
                    height: '100vh',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '2rem',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                }}>
                    <button
                        onClick={onBack}
                        style={{
                            position: 'absolute',
                            top: '2rem',
                            left: '2rem',
                            backgroundColor: 'rgba(255,255,255,0.2)',
                            border: 'none',
                            color: 'white',
                            padding: '0.5rem 1rem',
                            borderRadius: '0.5rem',
                            cursor: 'pointer',
                            fontSize: '1rem',
                            fontWeight: '600',
                            transition: 'all 0.3s ease'
                        }}
                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.3)'}
                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.2)'}
                    >
                        ← Back
                    </button>

                    <div style={{ marginBottom: '2rem', textAlign: 'center' }}>
                        <h1 style={{
                            fontSize: '2.5rem',
                            fontWeight: 'bold',
                            color: 'white',
                            textShadow: '0 4px 15px rgba(0,0,0,0.3)'
                        }}>
                            {deck.name}
                        </h1>
                        <p style={{
                            color: 'rgba(255,255,255,0.9)',
                            fontSize: '1.125rem',
                            marginTop: '0.5rem'
                        }}>
                            Choose a practice mode
                        </p>
                    </div>
                    
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))',
                        gap: '2rem',
                        maxWidth: '1000px',
                        width: '100%'
                    }}>
                        {modes.map((mode, index) => (
                            <button
                                key={mode.id}
                                onClick={() => onSelectMode(mode.id)}
                                style={{
                                    backgroundColor: 'white',
                                    border: 'none',
                                    borderRadius: '1rem',
                                    padding: '2rem',
                                    cursor: 'pointer',
                                    transition: 'all 0.3s ease',
                                    boxShadow: '0 10px 30px rgba(0,0,0,0.2)',
                                    animation: `fadeIn 0.6s ease-out ${0.1 * (index + 1)}s backwards`,
                                    display: 'flex',
                                    flexDirection: 'column',
                                    alignItems: 'center',
                                    textAlign: 'center'
                                }}
                                onMouseOver={(e) => {
                                    e.currentTarget.style.transform = 'translateY(-8px)';
                                    e.currentTarget.style.boxShadow = '0 15px 40px rgba(0,0,0,0.3)';
                                }}
                                onMouseOut={(e) => {
                                    e.currentTarget.style.transform = 'translateY(0)';
                                    e.currentTarget.style.boxShadow = '0 10px 30px rgba(0,0,0,0.2)';
                                }}
                            >
                                <div style={{ fontSize: '2.5rem', marginBottom: '1rem' }}>
                                    {mode.icon}
                                </div>
                                <div style={{
                                    fontSize: '1.125rem',
                                    fontWeight: '600',
                                    color: '#333',
                                    marginBottom: '0.5rem'
                                }}>
                                    {mode.name}
                                </div>
                                <div style={{
                                    fontSize: '0.875rem',
                                    color: '#666'
                                }}>
                                    {mode.description}
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };
            // MultipleChoiceMode
               const MultipleChoiceMode = ({ deckKey, onBack }) => {
            const deck = getDeck(deckKey);
            
            // Helper to shuffle any array
            const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        
            // Initial State
            const [queue, setQueue] = useState(() => shuffle(deck.words));
            const [currentIndex, setCurrentIndex] = useState(0);
            const [wrongAttempts, setWrongAttempts] = useState(0);
            const [firstTryCorrect, setFirstTryCorrect] = useState(0);
            const [hasAttemptedCurrent, setHasAttemptedCurrent] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isFinished, setIsFinished] = useState(false);
        
            const currentWord = queue[currentIndex];
        
            // Generate options once per card
            const options = useMemo(() => {
                if (!currentWord) return [];
                let choices = [currentWord.translation];
                let distractors = deck.words
                    .filter(w => w.word !== currentWord.word)
                    .map(w => w.translation);
                
                choices.push(...shuffle(distractors).slice(0, 3));
                return shuffle(choices);
            }, [currentWord, deck.words]);
        
            const handleAnswer = (choice) => {
                if (selectedAnswer) return; 
                setSelectedAnswer(choice);
        
                if (choice === currentWord.translation) {
                    // ONLY increment score if:
                    // 1. We haven't failed it yet on THIS specific turn (hasAttemptedCurrent)
                    // 2. This card's position is within the original deck size
                    if (!hasAttemptedCurrent && currentIndex < deck.words.length) {
                        setFirstTryCorrect(prev => prev + 1);
                    }
                    
                    setTimeout(() => {
                        if (currentIndex < queue.length - 1) {
                            setCurrentIndex(prev => prev + 1);
                            setSelectedAnswer(null);
                            setHasAttemptedCurrent(false);
                        } else {
                            setIsFinished(true);
                        }
                    }, 1000);
                } else {
                    // INCORRECT
                    setWrongAttempts(prev => prev + 1);
                    setHasAttemptedCurrent(true);
                    
                    // Push to the end of the list
                    setQueue(prev => [...prev, currentWord]);
                    
                    setTimeout(() => {
                        setSelectedAnswer(null);
                        setCurrentIndex(prev => prev + 1);
                        setHasAttemptedCurrent(false);
                    }, 1000);
                }
            };
        
          if (isFinished) {
        return (
            <div style={{ 
                width: '100%', 
                height: '100vh', 
                display: 'flex', 
                alignItems: 'center', 
                justifyContent: 'center',
                background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' 
            }}>
                <div style={{
                    backgroundColor: 'white',
                    padding: '3rem',
                    borderRadius: '1.5rem',
                    textAlign: 'center',
                    boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
                    maxWidth: '400px',
                    width: '90%'
                }}>
                    <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>
                        {firstTryCorrect === deck.words.length ? '👑' : '✨'}
                    </div>
                    <h2 style={{ color: '#333', fontSize: '2rem', marginBottom: '1rem' }}>Results</h2>
                    <p style={{ fontSize: '1.5rem', color: '#666', marginBottom: '2rem' }}>
                        Score: <strong>{firstTryCorrect} / {deck.words.length}</strong>
                    </p>
                    <button 
                        onClick={onBack} 
                        style={{
                            backgroundColor: '#667eea',
                            color: 'white',
                            border: 'none',
                            padding: '0.75rem 2rem',
                            borderRadius: '0.5rem',
                            cursor: 'pointer',
                            fontWeight: '600'
                        }}
                    >
                        Back to Menu
                    </button>
                </div>
            </div>
        );
    }
        
            return (
                <div style={{ padding: '2rem', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <div style={{ color: 'white', marginBottom: '1rem' }}>
                        Progress: {currentIndex + 1} / {queue.length}
                    </div>
        
                    <div style={cardStyle}>
                        <h1 style={{ fontSize: '3rem', margin: '1rem 0' }}>{currentWord.word}</h1>
                        
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', width: '100%' }}>
                            {options.map((option, i) => (
                                <button
                                    key={i}
                                    onClick={() => handleAnswer(option)}
                                    style={{
                                        ...optionStyle,
                                        backgroundColor: selectedAnswer === option 
                                            ? (option === currentWord.translation ? '#10b981' : '#ef4444')
                                            : 'white'
                                    }}
                                >
                                    {option}
                                </button>
                            ))}
                        </div>
                    </div>
        
                    <button onClick={onBack} style={{
                        position: 'absolute', bottom: '2rem', left: '2rem',
                        backgroundColor: 'rgba(255,255,255,0.2)', border: 'none', color: 'white',
                        padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer',
                        fontSize: '1rem', fontWeight: '600'
                    }}>
                        ← Back
                    </button>
                </div>
            );
        };
      
        // Type Answer Mode
       const TypeAnswerMode = ({ deckKey, onBack }) => {
            const deck = getDeck(deckKey);
            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
        
            const [queue, setQueue] = useState(() => shuffle(deck.words));
            const [currentIndex, setCurrentIndex] = useState(0);
            const [firstTryCorrect, setFirstTryCorrect] = useState(0);
            const [hasAttemptedCurrent, setHasAttemptedCurrent] = useState(false);
            const [inputValue, setInputValue] = useState('');
            const [answered, setAnswered] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [isFinished, setIsFinished] = useState(false);
            const inputRef = useRef(null);
        
            const currentWord = queue[currentIndex];
            const originalDeckSize = deck.words.length;
        
            useEffect(() => {
                if (inputRef.current) inputRef.current.focus();
            }, [currentIndex]);
        
            const handleSubmit = () => {
                if (!inputValue.trim() || answered) return;
                const userAnswer = inputValue.trim().toLowerCase();
                const correct = userAnswer === currentWord.translation.toLowerCase();
                setAnswered(true);
                setIsCorrect(correct);
        
                if (correct) {
                    if (!hasAttemptedCurrent && currentIndex < originalDeckSize) {
                        setFirstTryCorrect(prev => prev + 1);
                    }
                } else {
                    setHasAttemptedCurrent(true);
                    setQueue(prev => [...prev, currentWord]);
                }
            };
        
            const handleNext = () => {
                if (currentIndex < queue.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setInputValue('');
                    setAnswered(false);
                    setIsCorrect(null);
                    setHasAttemptedCurrent(false);
                } else {
                    setIsFinished(true);
                }
            };
        
            if (isFinished) {
                return (
                    <div style={{
                        width: '100%', height: '100vh', display: 'flex',
                        alignItems: 'center', justifyContent: 'center',
                        background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                    }}>
                        <div style={{
                            backgroundColor: 'white', padding: '3rem', borderRadius: '1.5rem',
                            textAlign: 'center', boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
                            maxWidth: '400px', width: '90%'
                        }}>
                            <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>
                                {firstTryCorrect === originalDeckSize ? '👑' : '✨'}
                            </div>
                            <h2 style={{ color: '#333', fontSize: '2rem', marginBottom: '1rem' }}>Results</h2>
                            <p style={{ fontSize: '1.5rem', color: '#666', marginBottom: '2rem' }}>
                                Score: <strong>{firstTryCorrect} / {originalDeckSize}</strong>
                            </p>
                            <button onClick={onBack} style={{
                                backgroundColor: '#667eea', color: 'white', border: 'none',
                                padding: '0.75rem 2rem', borderRadius: '0.5rem',
                                cursor: 'pointer', fontWeight: '600', fontSize: '1rem'
                            }}>
                                Back to Menu
                            </button>
                        </div>
                    </div>
                );
            }
        
            return (
                <div style={{
                    width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                    alignItems: 'center', justifyContent: 'center',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    padding: '2rem'
                }}>
                    <button onClick={onBack} style={{
                        position: 'absolute', top: '2rem', left: '2rem',
                        backgroundColor: 'rgba(255,255,255,0.2)', border: 'none', color: 'white',
                        padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer',
                        fontSize: '1rem', fontWeight: '600'
                    }}>← Back</button>
        
                    <div style={{
                        position: 'absolute', top: '2rem', right: '2rem',
                        color: 'white', fontSize: '1rem', fontWeight: '600'
                    }}>
                        Progress: {currentIndex + 1} / {queue.length}
                    </div>
        
                    <div style={{ ...cardStyle, maxWidth: '500px' }}>
                        <p style={{ color: '#888', fontSize: '0.8rem', textTransform: 'uppercase', marginBottom: '0.5rem' }}>
                            Translate to English
                        </p>
                        <h2 style={{ fontSize: '3rem', fontWeight: 'bold', color: '#333', marginBottom: '2rem' }}>
                            {currentWord.word}
                        </h2>
        
                        <input
                            ref={inputRef}
                            type="text"
                            value={inputValue}
                            onChange={(e) => setInputValue(e.target.value)}
                            onKeyDown={(e) => {
                                if (e.key === 'Enter') {
                                    if (!answered) handleSubmit();
                                    else handleNext();
                                }
                            }}
                            placeholder="Type translation..."

                            }}
                        />
        
                        {answered && (
                            <div style={{
                                padding: '0.75rem', borderRadius: '0.5rem', marginBottom: '1rem',
                                backgroundColor: isCorrect ? '#d1fae5' : '#fee2e2',
                                color: isCorrect ? '#065f46' : '#991b1b',
                                fontWeight: '600', fontSize: '0.95rem'
                            }}>
                                {isCorrect ? '✓ Correct!' : `✗ The answer was: ${currentWord.translation}`}
                                {!isCorrect && <div style={{ fontSize: '0.8rem', marginTop: '0.25rem' }}>This card will come back later.</div>}

                                    width: '100%', padding: '0.85rem', backgroundColor: '#667eea',

                                    cursor: 'pointer', fontWeight: '600', fontSize: '1rem'

        };

        // Handwriting Mode
        const HandwriteMode = ({ deckKey, onBack }) => {
            const deck = getDeck(deckKey);
            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
        
            const [queue, setQueue] = useState(() => shuffle(deck.words));
            const [currentIndex, setCurrentIndex] = useState(0);
            const [firstTryCorrect, setFirstTryCorrect] = useState(0);
            const [hasAttemptedCurrent, setHasAttemptedCurrent] = useState(false);
            const [showAnswer, setShowAnswer] = useState(false);
            const [graded, setGraded] = useState(false);
            const [isFinished, setIsFinished] = useState(false);
            const canvasRef = useRef(null);
            const isDrawingRef = useRef(false);
            const originalDeckSize = deck.words.length;
        
            const currentWord = queue[currentIndex];
        
            // Set up canvas whenever the card changes
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * window.devicePixelRatio;
                canvas.height = rect.height * window.devicePixelRatio;
                const ctx = canvas.getContext('2d');
                ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, rect.width, rect.height);
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            }, [currentIndex]);
        
            const getPos = (e, canvas) => {
                const rect = canvas.getBoundingClientRect();
                if (e.touches) {
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                }
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            };
        
            const startDraw = (e) => {
                e.preventDefault();
                isDrawingRef.current = true;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pos = getPos(e, canvas);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            };
        
            const draw = (e) => {
                e.preventDefault();
                if (!isDrawingRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pos = getPos(e, canvas);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };
        
            const endDraw = () => { isDrawingRef.current = false; };
        
            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, rect.width, rect.height);
            };
        
            const handleGrade = (correct) => {
                setGraded(true);
                if (correct) {
                    if (!hasAttemptedCurrent && currentIndex < originalDeckSize) {
                        setFirstTryCorrect(prev => prev + 1);
                    }
                } else {
                    setHasAttemptedCurrent(true);
                    setQueue(prev => [...prev, currentWord]);
                }
            };
        
            const handleNext = () => {
                if (currentIndex < queue.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setShowAnswer(false);
                    setGraded(false);
                    setHasAttemptedCurrent(false);
                } else {
                    setIsFinished(true);
                }
            };
        
            if (isFinished) {
                return (
                    <div style={{
                        width: '100%', height: '100vh', display: 'flex',
                        alignItems: 'center', justifyContent: 'center',
                        background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
                    }}>
                        <div style={{
                            backgroundColor: 'white', padding: '3rem', borderRadius: '1.5rem',
                            textAlign: 'center', boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
                            maxWidth: '400px', width: '90%'
                        }}>
                            <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>
                                {firstTryCorrect === originalDeckSize ? '👑' : '✨'}
                            </div>
                            <h2 style={{ color: '#333', fontSize: '2rem', marginBottom: '1rem' }}>Results</h2>
                            <p style={{ fontSize: '1.5rem', color: '#666', marginBottom: '2rem' }}>
                                Score: <strong>{firstTryCorrect} / {originalDeckSize}</strong>
                            </p>
                            <button onClick={onBack} style={{
                                backgroundColor: '#667eea', color: 'white', border: 'none',
                                padding: '0.75rem 2rem', borderRadius: '0.5rem',
                                cursor: 'pointer', fontWeight: '600', fontSize: '1rem'
                            }}>
                                Back to Menu
                            </button>
                        </div>
                    </div>
                );
            }
        
            return (
                <div style={{
                    width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                    alignItems: 'center', justifyContent: 'center',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    padding: '2rem'
                }}>
                    <button onClick={onBack} style={{
                        position: 'absolute', top: '2rem', left: '2rem',
                        backgroundColor: 'rgba(255,255,255,0.2)', border: 'none', color: 'white',
                        padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer',
                        fontSize: '1rem', fontWeight: '600'
                    }}>← Back</button>
        
                    <div style={{
                        position: 'absolute', top: '2rem', right: '2rem',
                        color: 'white', fontSize: '1rem', fontWeight: '600'
                    }}>
                        Progress: {currentIndex + 1} / {queue.length}
                    </div>
        
                    <div style={{ ...cardStyle, maxWidth: '600px' }}>
                        <p style={{ color: '#888', fontSize: '0.8rem', textTransform: 'uppercase', marginBottom: '0.5rem' }}>
                            Write the translation in English
                        </p>
                        <h2 style={{ fontSize: '3rem', fontWeight: 'bold', color: '#333', marginBottom: '1.5rem' }}>
                            {currentWord.word}
                        </h2>
        
                        {/* Drawing canvas */}
                        <canvas
                            ref={canvasRef}
                            onMouseDown={startDraw}
                            onMouseMove={draw}
                            onMouseUp={endDraw}
                            onMouseLeave={endDraw}
                            onTouchStart={startDraw}
                            onTouchMove={draw}
                            onTouchEnd={endDraw}
                            style={{
                                border: '2px solid #ddd', borderRadius: '0.5rem',
                                cursor: 'crosshair', display: 'block',
                                width: '100%', height: '200px',
                                marginBottom: '1rem', touchAction: 'none'
                            }}
                        />
        
                        <button onClick={clearCanvas} style={{
                            width: '100%', padding: '0.6rem', marginBottom: '1rem',
                            backgroundColor: '#f3f4f6', border: '1px solid #ddd',
                            borderRadius: '0.5rem', cursor: 'pointer', color: '#555',
                            fontSize: '0.9rem', fontWeight: '600'
                        }}>
                            Clear ✕
                        </button>
        
                        {/* Show answer toggle */}
                        {!showAnswer ? (
                            <button
                                onClick={() => setShowAnswer(true)}
                                style={{
                                    width: '100%', padding: '0.85rem', backgroundColor: '#667eea',
                                    color: 'white', border: 'none', borderRadius: '0.5rem',
                                    cursor: 'pointer', fontWeight: '600', fontSize: '1rem',
                                    marginBottom: '1rem'
                                }}
                            >Show Answer</button>
                        ) : (
                            <div style={{
                                padding: '0.85rem', borderRadius: '0.5rem', marginBottom: '1rem',
                                backgroundColor: '#f0f4ff', border: '2px solid #667eea',
                                fontSize: '1.5rem', fontWeight: 'bold', color: '#333', textAlign: 'center'
                            }}>
                                {currentWord.translation}
                            </div>
                        )}
        
                        {/* Self-grade buttons (only after answer is shown and not yet graded) */}
                        {showAnswer && !graded && (
                            <div style={{ display: 'flex', gap: '0.75rem' }}>
                                <button
                                    onClick={() => handleGrade(true)}
                                    style={{
                                        flex: 1, padding: '0.85rem', backgroundColor: '#10b981',
                                        color: 'white', border: 'none', borderRadius: '0.5rem',
                                        cursor: 'pointer', fontWeight: '600', fontSize: '1rem'
                                    }}
                                >✓ Got it</button>
                                <button
                                    onClick={() => handleGrade(false)}
                                    style={{
                                        flex: 1, padding: '0.85rem', backgroundColor: '#ef4444',
                                        color: 'white', border: 'none', borderRadius: '0.5rem',
                                        cursor: 'pointer', fontWeight: '600', fontSize: '1rem'
                                    }}
                                >✗ Missed it</button>
                            </div>
                        )}
        
                        {/* Next button after grading */}
                        {graded && (
                            <button
                                onClick={handleNext}
                                style={{
                                    width: '100%', padding: '0.85rem', backgroundColor: '#667eea',
                                    color: 'white', border: 'none', borderRadius: '0.5rem',
                                    cursor: 'pointer', fontWeight: '600', fontSize: '1rem'
                                }}
                            >
                                {currentIndex < queue.length - 1 ? 'Next →' : 'Finish'}
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // Flappy Bird Mode
        const FlappyBirdMode = ({ deckKey, onBack }) => {
            const deck = getDeck(deckKey);
            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

            const GRAVITY = 0.45;
            const JUMP = -7.5;
            const PIPE_SPEED = 2.4;
            const PIPE_WIDTH = 80;
            const PIPE_GAP = 160;
            const BIRD_X = 80;
            const BIRD_SIZE = 28;
            const GAME_W = 480;
            const GAME_H = 520;

            const [started, setStarted] = useState(false);
            const [dead, setDead] = useState(false);
            const [score, setScore] = useState(0);
            const [birdY, setBirdY] = useState(GAME_H / 2);
            const [velocity, setVelocity] = useState(0);
            const [pipes, setPipes] = useState([]);
            const [currentWord, setCurrentWord] = useState(null);
            const [flashCorrect, setFlashCorrect] = useState(false);
            const [flashWrong, setFlashWrong] = useState(false);
            const [groundOffset, setGroundOffset] = useState(0);

            const birdYRef = useRef(GAME_H / 2);
            const velocityRef = useRef(0);
            const pipesRef = useRef([]);
            const deadRef = useRef(false);
            const scoreRef = useRef(0);
            const wordQueueRef = useRef([]);
            const frameRef = useRef(null);
            const pipeIdRef = useRef(0);

            const getNextWord = () => {
                if (wordQueueRef.current.length === 0)
                    wordQueueRef.current = shuffle([...deck.words]);
                return wordQueueRef.current.pop();
            };

            const makeTranslationOptions = (correctWord) => {
                const correct = correctWord.translation;
                const distractors = shuffle(
                    deck.words.filter(w => w.word !== correctWord.word)
                ).slice(0, 1).map(w => w.translation);
                const options = shuffle([correct, ...distractors]);
                return { top: options[0], bottom: options[1], correctTranslation: correct };
            };

            const spawnPipe = (existingPipes) => {
                const gapTop = 80 + Math.random() * (GAME_H - PIPE_GAP - 160);
                const word = getNextWord();
                const { top, bottom, correctTranslation } = makeTranslationOptions(word);
                return {
                    id: pipeIdRef.current++,
                    x: GAME_W + PIPE_WIDTH,
                    gapTop,
                    word,
                    topLabel: top,
                    bottomLabel: bottom,
                    correctTranslation,
                    topIsCorrect: top === correctTranslation,
                    passed: false,
                };
            };

            const jump = () => {
                if (deadRef.current) return;
                velocityRef.current = JUMP;
            };

            useEffect(() => {
                if (!started || dead) return;

                wordQueueRef.current = shuffle([...deck.words]);
                const firstPipe = spawnPipe([]);
                setCurrentWord(firstPipe.word);
                pipesRef.current = [firstPipe];
                setPipes([firstPipe]);

                const tick = () => {
                    if (deadRef.current) return;

                    // Physics
                    velocityRef.current += GRAVITY;
                    birdYRef.current += velocityRef.current;

                    // Ground / ceiling
                    if (birdYRef.current >= GAME_H - 40 || birdYRef.current <= 0) {
                        deadRef.current = true;
                        setDead(true);
                        return;
                    }

                    // Move pipes
                    let newPipes = pipesRef.current.map(p => ({ ...p, x: p.x - PIPE_SPEED }));

                    // Spawn new pipe
                    const last = newPipes[newPipes.length - 1];
                    if (last && last.x < GAME_W - 260) {
                        const np = spawnPipe(newPipes);
                        newPipes = [...newPipes, np];
                        setCurrentWord(np.word);
                    }

                    // Remove off-screen
                    newPipes = newPipes.filter(p => p.x > -PIPE_WIDTH - 20);

                    // Collision detection
                    const bx = BIRD_X;
                    const by = birdYRef.current;
                    const r = BIRD_SIZE / 2 - 3;

                    for (const pipe of newPipes) {
                        const inXRange = bx + r > pipe.x && bx - r < pipe.x + PIPE_WIDTH;
                        if (inXRange) {
                            const inTopPipe = by - r < pipe.gapTop;
                            const inBottomPipe = by + r > pipe.gapTop + PIPE_GAP;
                            if (inTopPipe || inBottomPipe) {
                                deadRef.current = true;
                                setDead(true);
                                return;
                            }
                        }

                        // Passed through gap — check correctness
                        if (!pipe.passed && pipe.x + PIPE_WIDTH < bx - r) {
                            pipe.passed = true;
                            const birdMidY = by;
                            const wentThroughTop = birdMidY < pipe.gapTop + PIPE_GAP / 2;
                            const choseCorrect = wentThroughTop
                                ? pipe.topIsCorrect
                                : !pipe.topIsCorrect;

                            if (choseCorrect) {
                                scoreRef.current += 1;
                                setScore(scoreRef.current);
                                setFlashCorrect(true);
                                setTimeout(() => setFlashCorrect(false), 300);
                            } else {
                                setFlashWrong(true);
                                setTimeout(() => setFlashWrong(false), 300);
                                deadRef.current = true;
                                setDead(true);
                                return;
                            }
                        }
                    }

                    pipesRef.current = newPipes;
                    setBirdY(birdYRef.current);
                    setPipes([...newPipes]);
                    setVelocity(velocityRef.current);
                    setGroundOffset(prev => (prev + PIPE_SPEED) % 48);

                    frameRef.current = requestAnimationFrame(tick);
                };

                frameRef.current = requestAnimationFrame(tick);
                return () => cancelAnimationFrame(frameRef.current);
            }, [started, dead]);

            const handleRestart = () => {
                deadRef.current = false;
                birdYRef.current = GAME_H / 2;
                velocityRef.current = 0;
                pipesRef.current = [];
                scoreRef.current = 0;
                wordQueueRef.current = shuffle([...deck.words]);
                setDead(false);
                setScore(0);
                setBirdY(GAME_H / 2);
                setVelocity(0);
                setPipes([]);
                setCurrentWord(null);
                setFlashCorrect(false);
                setFlashWrong(false);
            };

            const birdRotation = Math.min(Math.max(velocity * 3, -25), 60);
            const skyColor = flashCorrect ? '#1a3a2a' : flashWrong ? '#3a1a1a' : '#1a2a3a';

            if (!started) return (
                <div style={{
                    width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                    alignItems: 'center', justifyContent: 'center',
                    background: 'linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%)'
                }}>
                    <button onClick={onBack} style={{
                        position: 'absolute', top: '2rem', left: '2rem',
                        backgroundColor: 'rgba(255,255,255,0.1)', border: 'none', color: 'white',
                        padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: '600'
                    }}>← Back</button>
                    <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>🐦</div>
                    <h1 style={{ color: 'white', fontSize: '2.75rem', fontWeight: '900', letterSpacing: '-2px', marginBottom: '0.5rem' }}>
                        Flappy Bird
                    </h1>
                    <p style={{ color: 'rgba(255,255,255,0.5)', textAlign: 'center', maxWidth: '300px', lineHeight: 1.7, marginBottom: '0.5rem' }}>
                        A word appears above. Fly through the gap next to the correct translation. Wrong gap = game over!
                    </p>
                    <p style={{ color: 'rgba(255,255,255,0.25)', fontSize: '0.85rem', marginBottom: '2.5rem' }}>
                        Click or tap anywhere to flap
                    </p>
                    <button
                        onClick={() => setStarted(true)}
                        style={{
                            backgroundColor: '#38bdf8', color: '#0f2027', border: 'none',
                            padding: '1rem 3rem', borderRadius: '2rem', cursor: 'pointer',
                            fontSize: '1.2rem', fontWeight: '900', letterSpacing: '1px',
                            boxShadow: '0 0 40px rgba(56,189,248,0.4)'
                        }}>
                        FLAP
                    </button>
                </div>
            );

            return (
                <div
                    onClick={jump}
                    style={{
                        width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                        alignItems: 'center', justifyContent: 'center',
                        background: 'linear-gradient(180deg, #0f2027 0%, #203a43 100%)',
                        cursor: 'pointer', userSelect: 'none', position: 'relative'
                    }}
                >
                    {/* Back button */}
                    <button
                        onClick={(e) => { e.stopPropagation(); onBack(); }}
                        style={{
                            position: 'absolute', top: '1rem', left: '1rem',
                            backgroundColor: 'rgba(255,255,255,0.1)', border: 'none', color: 'white',
                            padding: '0.4rem 0.9rem', borderRadius: '0.5rem', cursor: 'pointer',
                            fontWeight: '600', zIndex: 50, fontSize: '0.9rem'
                        }}>← Back</button>

                    {/* Score */}
                    <div style={{
                        position: 'absolute', top: '1rem', right: '1rem',
                        color: 'white', fontWeight: '900', fontSize: '1.5rem', zIndex: 50,
                        textShadow: '0 2px 8px rgba(0,0,0,0.5)'
                    }}>⚡ {score}</div>

                    {/* Word to translate */}
                    {currentWord && (
                        <div style={{
                            position: 'absolute', top: '1rem',
                            left: '50%', transform: 'translateX(-50%)',
                            backgroundColor: 'rgba(0,0,0,0.6)',
                            border: '1px solid rgba(56,189,248,0.4)',
                            borderRadius: '1rem', padding: '0.5rem 1.25rem',
                            zIndex: 50, textAlign: 'center'
                        }}>
                            <p style={{ color: 'rgba(255,255,255,0.4)', fontSize: '0.65rem', textTransform: 'uppercase', letterSpacing: '2px' }}>translate</p>
                            <p style={{ color: 'white', fontWeight: '900', fontSize: '1.4rem', letterSpacing: '-0.5px' }}>{currentWord.word}</p>
                        </div>
                    )}

                    {/* Game canvas */}
                    <div style={{
                        position: 'relative',
                        width: `${GAME_W}px`, height: `${GAME_H}px`,
                        maxWidth: '100%',
                        backgroundColor: skyColor,
                        borderRadius: '1rem',
                        overflow: 'hidden',
                        border: `2px solid ${flashCorrect ? '#4ade80' : flashWrong ? '#f87171' : 'rgba(255,255,255,0.08)'}`,
                        boxShadow: flashCorrect
                            ? '0 0 40px rgba(74,222,128,0.3)'
                            : flashWrong
                            ? '0 0 40px rgba(248,113,113,0.3)'
                            : '0 20px 60px rgba(0,0,0,0.5)',
                        transition: 'background-color 0.2s, border-color 0.2s'
                    }}>
                        {/* Stars */}
                        {[...Array(18)].map((_, i) => (
                            <div key={i} style={{
                                position: 'absolute',
                                width: i % 3 === 0 ? '2px' : '1px',
                                height: i % 3 === 0 ? '2px' : '1px',
                                backgroundColor: 'rgba(255,255,255,0.5)',
                                borderRadius: '50%',
                                left: `${(i * 53) % 100}%`,
                                top: `${(i * 37) % 60}%`
                            }} />
                        ))}

                        {/* Pipes */}
                        {pipes.map(pipe => (
                            <React.Fragment key={pipe.id}>
                                {/* Top pipe */}
                                <div style={{
                                    position: 'absolute',
                                    left: pipe.x, top: 0,
                                    width: PIPE_WIDTH, height: pipe.gapTop,
                                    background: 'linear-gradient(90deg, #166534, #16a34a, #166534)',
                                    borderRadius: '0 0 6px 6px',
                                    boxShadow: '2px 0 8px rgba(0,0,0,0.4)'
                                }}>
                                    {/* Cap */}
                                    <div style={{
                                        position: 'absolute', bottom: 0,
                                        left: -6, right: -6, height: 20,
                                        background: 'linear-gradient(90deg, #166534, #22c55e, #166534)',
                                        borderRadius: '4px'
                                    }} />
                                    {/* Label */}
                                    <div style={{
                                        position: 'absolute', bottom: 28,
                                        left: 0, right: 0, textAlign: 'center',
                                        color: 'white', fontWeight: '800', fontSize: '0.8rem',
                                        textShadow: '0 1px 4px rgba(0,0,0,0.8)',
                                        padding: '0 4px', lineHeight: 1.2
                                    }}>{pipe.topLabel}</div>
                                </div>

                                {/* Bottom pipe */}
                                <div style={{
                                    position: 'absolute',
                                    left: pipe.x,
                                    top: pipe.gapTop + PIPE_GAP,
                                    width: PIPE_WIDTH,
                                    height: GAME_H - pipe.gapTop - PIPE_GAP,
                                    background: 'linear-gradient(90deg, #166534, #16a34a, #166534)',
                                    borderRadius: '6px 6px 0 0',
                                    boxShadow: '2px 0 8px rgba(0,0,0,0.4)'
                                }}>
                                    {/* Cap */}
                                    <div style={{
                                        position: 'absolute', top: 0,
                                        left: -6, right: -6, height: 20,
                                        background: 'linear-gradient(90deg, #166534, #22c55e, #166534)',
                                        borderRadius: '4px'
                                    }} />
                                    {/* Label */}
                                    <div style={{
                                        position: 'absolute', top: 28,
                                        left: 0, right: 0, textAlign: 'center',
                                        color: 'white', fontWeight: '800', fontSize: '0.8rem',
                                        textShadow: '0 1px 4px rgba(0,0,0,0.8)',
                                        padding: '0 4px', lineHeight: 1.2
                                    }}>{pipe.bottomLabel}</div>
                                </div>
                            </React.Fragment>
                        ))}

                        {/* Ground */}
                        <div style={{
                            position: 'absolute', bottom: 0, left: 0, right: 0, height: 40,

                        {/* Bird */}
                        <div style={{

                        {/* Death overlay */}
                        {dead && (
                            <div style={{
                                position: 'absolute', inset: 0,
