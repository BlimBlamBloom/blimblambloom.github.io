                                display: 'flex', flexDirection: 'column',
                                alignItems: 'center', justifyContent: 'center',
                                borderRadius: '1rem'
                            }}
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div style={{ fontSize: '2.5rem', marginBottom: '0.5rem' }}>
                                    {score >= 10 ? '🏆' : score >= 5 ? '🌟' : '💀'}
                                </div>
                                <h2 style={{ color: 'white', fontSize: '1.75rem', fontWeight: '900', letterSpacing: '-1px', marginBottom: '0.25rem' }}>
                                    Game Over
                                </h2>
                                <p style={{ color: 'rgba(255,255,255,0.5)', marginBottom: '1.5rem', fontSize: '1.1rem' }}>
                                    Score: <strong style={{ color: '#38bdf8' }}>{score}</strong>
                                </p>
                                <div style={{ display: 'flex', gap: '0.75rem' }}>
                                    <button
                                        onClick={handleRestart}
                                        style={{
                                            backgroundColor: '#38bdf8', color: '#0f2027', border: 'none',
                                            padding: '0.7rem 1.5rem', borderRadius: '2rem',
                                            cursor: 'pointer', fontWeight: '900', fontSize: '0.95rem'
                                        }}>Try Again</button>
                                    <button
                                        onClick={onBack}
                                        style={{
                                            backgroundColor: 'rgba(255,255,255,0.1)', color: 'white', border: 'none',
                                            padding: '0.7rem 1.5rem', borderRadius: '2rem',
                                            cursor: 'pointer', fontWeight: '700', fontSize: '0.95rem'
                                        }}>Menu</button>
                                </div>
                            </div>
                        )}
                    </div>

                    <p style={{ color: 'rgba(255,255,255,0.2)', fontSize: '0.8rem', marginTop: '0.75rem' }}>
                        click or tap anywhere to flap
                    </p>
                </div>
            );
        };
        
        // Drum Machine Mode
        const DrumMachineMode = ({ deckKey, onBack }) => {
                const deck = getDeck(deckKey);
                const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
    
                const BPM = 72;
                const BEAT_INTERVAL = (60 / BPM) * 1000;
                const TOTAL_ROUNDS = 10;
                const OPTIONS_COUNT = 4;
    
                const [started, setStarted] = useState(false);
                const [isFinished, setIsFinished] = useState(false);
                const [wordQueue, setWordQueue] = useState([]);
                const [currentWord, setCurrentWord] = useState(null);
                const [options, setOptions] = useState([]);
                const [score, setScore] = useState(0);
                const [round, setRound] = useState(0);
                const [beat, setBeat] = useState(0);
                const [pulsing, setPulsing] = useState(false);
                const [feedback, setFeedback] = useState(null); // { index, correct }
                const [answered, setAnswered] = useState(false);
                const [missedBeat, setMissedBeat] = useState(false);
                const [beatsUntilNext, setBeatsUntilNext] = useState(4);
                const [activeBeats, setActiveBeats] = useState(4);
    
                const beatRef = useRef(0);
                const answeredRef = useRef(false);
                const beatsUntilNextRef = useRef(4);
                const roundRef = useRef(0);
                const intervalRef = useRef(null);
    
                const buildOptions = (word, allWords) => {
                    const correct = word.translation;
                    const distractors = shuffle(allWords.filter(w => w.word !== word.word)).slice(0, OPTIONS_COUNT - 1).map(w => w.translation);
                    return shuffle([correct, ...distractors]);
                };
    
                const loadRound = (queue, roundIndex) => {
                    const word = queue[roundIndex];
                    setCurrentWord(word);
                    setOptions(buildOptions(word, deck.words));
                    setAnswered(false);
                    answeredRef.current = false;
                    setFeedback(null);
                    setMissedBeat(false);
                    const beats = 4;
                    setBeatsUntilNext(beats);
                    beatsUntilNextRef.current = beats;
                };
    
                useEffect(() => {
                    if (!started) return;
                    const q = shuffle([...deck.words]).slice(0, TOTAL_ROUNDS);
                    setWordQueue(q);
                    setRound(0);
                    roundRef.current = 0;
                    loadRound(q, 0);
    
                    intervalRef.current = setInterval(() => {
                        setBeat(b => {
                            const next = (b + 1) % 4;
                            return next;
                        });
                        setPulsing(true);
                        setTimeout(() => setPulsing(false), 120);
    
                        beatsUntilNextRef.current -= 1;
                        setBeatsUntilNext(prev => prev - 1);
    
                        if (beatsUntilNextRef.current <= 0) {
                            if (!answeredRef.current) {
                                setMissedBeat(true);
                            }
                            const nextRound = roundRef.current + 1;
                            if (nextRound >= TOTAL_ROUNDS) {
                                clearInterval(intervalRef.current);
                                setTimeout(() => setIsFinished(true), 600);
                            } else {
                                roundRef.current = nextRound;
                                setRound(nextRound);
                                setWordQueue(prev => {
                                    loadRound(prev, nextRound);
                                    return prev;
                                });
                            }
                        }
                    }, BEAT_INTERVAL);
    
                    return () => clearInterval(intervalRef.current);
                }, [started]);
    
                const handleTap = (index) => {
                    if (answered || !currentWord) return;
                    const isCorrect = options[index] === currentWord.translation;
                    setFeedback({ index, correct: isCorrect });
                    setAnswered(true);
                    answeredRef.current = true;
                    if (isCorrect) setScore(s => s + 1);
                };
    
                const padColors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff'];
                const padLabels = ['A','B','C','D'];
    
                const BeatDots = () => (
                    <div style={{ display: 'flex', gap: '12px', justifyContent: 'center', marginBottom: '1.5rem' }}>
                        {[0,1,2,3].map(i => (
                            <div key={i} style={{
                                width: i === beat && pulsing ? '18px' : '12px',
                                height: i === beat && pulsing ? '18px' : '12px',
                                borderRadius: '50%',
                                backgroundColor: i === beat ? '#ffd93d' : 'rgba(255,255,255,0.15)',
                                transition: 'all 0.1s ease',
                                boxShadow: i === beat && pulsing ? '0 0 12px #ffd93d' : 'none'
                            }} />
                        ))}
                    </div>
                );
    
                if (!started) return (
                    <div style={{
                        width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                        alignItems: 'center', justifyContent: 'center',
                        background: '#0d0d0d'
                    }}>
                        <button onClick={onBack} style={{
                            position: 'absolute', top: '2rem', left: '2rem',
                            backgroundColor: 'rgba(255,255,255,0.08)', border: 'none', color: 'white',
                            padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: '600'
                        }}>← Back</button>
    
                        <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>🥁</div>
                        <h1 style={{
                            color: 'white', fontSize: '2.75rem', fontWeight: '900',
                            letterSpacing: '-2px', marginBottom: '0.5rem'
                        }}>Drum Machine</h1>
                        <p style={{ color: 'rgba(255,255,255,0.4)', marginBottom: '0.5rem', textAlign: 'center', maxWidth: '300px', lineHeight: 1.6 }}>
                            A word appears on the beat. Tap the correct translation pad before the next beat drops.
                        </p>
                        <p style={{ color: 'rgba(255,255,255,0.25)', fontSize: '0.85rem', marginBottom: '2.5rem' }}>
                            {TOTAL_ROUNDS} rounds · {BPM} BPM
                        </p>
                        <button onClick={() => setStarted(true)} style={{
                            backgroundColor: '#ffd93d', color: '#0d0d0d', border: 'none',
                            padding: '1rem 3rem', borderRadius: '2rem', cursor: 'pointer',
                            fontSize: '1.2rem', fontWeight: '900', letterSpacing: '2px',
                            boxShadow: '0 0 40px rgba(255,217,61,0.4)'
                        }}>DROP IT</button>
                    </div>
                );
    
                if (isFinished) return (
                    <div style={{
                        width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                        alignItems: 'center', justifyContent: 'center', background: '#0d0d0d'
                    }}>
                        <div style={{
                            border: '1px solid rgba(255,255,255,0.1)',
                            backgroundColor: 'rgba(255,255,255,0.04)',
                            padding: '3rem', borderRadius: '1.5rem',
                            textAlign: 'center', maxWidth: '360px', width: '90%'
                        }}>
                            <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>
                                {score >= 8 ? '🎛️' : score >= 5 ? '🥁' : '🎵'}
                            </div>
                            <h2 style={{ color: 'white', fontSize: '2rem', fontWeight: '900', letterSpacing: '-1px', marginBottom: '1.5rem' }}>
                                Session Over
                            </h2>
                            <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center', marginBottom: '2rem' }}>
                                <div style={{
                                    backgroundColor: 'rgba(255,217,61,0.1)', border: '1px solid #ffd93d',
                                    borderRadius: '1rem', padding: '1rem 1.5rem'
                                }}>
                                    <div style={{ color: '#ffd93d', fontSize: '2.25rem', fontWeight: '900' }}>{score}</div>
                                    <div style={{ color: 'rgba(255,255,255,0.4)', fontSize: '0.75rem', letterSpacing: '1px' }}>HITS</div>
                                </div>
                                <div style={{
                                    backgroundColor: 'rgba(255,107,107,0.1)', border: '1px solid #ff6b6b',
                                    borderRadius: '1rem', padding: '1rem 1.5rem'
                                }}>
                                    <div style={{ color: '#ff6b6b', fontSize: '2.25rem', fontWeight: '900' }}>{TOTAL_ROUNDS - score}</div>
                                    <div style={{ color: 'rgba(255,255,255,0.4)', fontSize: '0.75rem', letterSpacing: '1px' }}>MISSES</div>
                                </div>
                            </div>
                            <button onClick={onBack} style={{
                                backgroundColor: '#ffd93d', color: '#0d0d0d', border: 'none',
                                padding: '0.85rem 2.5rem', borderRadius: '2rem',
                                cursor: 'pointer', fontWeight: '900', fontSize: '1rem'
                            }}>Back to Menu</button>
                        </div>
                    </div>
                );
    
                return (
                    <div style={{
                        width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                        alignItems: 'center', justifyContent: 'center',
                        background: '#0d0d0d', padding: '1.5rem', userSelect: 'none'
                    }}>
                        {/* Header */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', width: '100%', maxWidth: '480px', marginBottom: '2rem' }}>
                            <button onClick={onBack} style={{
                                backgroundColor: 'rgba(255,255,255,0.08)', border: 'none', color: 'white',
                                padding: '0.4rem 0.9rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: '600'
                            }}>← Back</button>
                            <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                                <span style={{ color: '#ffd93d', fontWeight: '900', fontSize: '1.1rem' }}>⚡ {score}/{TOTAL_ROUNDS}</span>
                                <span style={{ color: 'rgba(255,255,255,0.3)', fontSize: '0.9rem' }}>Round {round + 1}</span>
                            </div>
                        </div>
    
                        <BeatDots />
    
                        {/* Word display */}
                        <div style={{
                            width: '100%', maxWidth: '480px',
                            backgroundColor: pulsing ? 'rgba(255,217,61,0.08)' : 'rgba(255,255,255,0.04)',
                            border: `2px solid ${pulsing ? '#ffd93d' : 'rgba(255,255,255,0.08)'}`,
                            borderRadius: '1.25rem', padding: '2rem',
                            textAlign: 'center', marginBottom: '2rem',
                            transition: 'all 0.1s ease',
                            boxShadow: pulsing ? '0 0 40px rgba(255,217,61,0.15)' : 'none'
                        }}>
                            <p style={{ color: 'rgba(255,255,255,0.3)', fontSize: '0.7rem', textTransform: 'uppercase', letterSpacing: '3px', marginBottom: '0.5rem' }}>
                                Translate
                            </p>
                            <p style={{ color: 'white', fontSize: '3rem', fontWeight: '900', letterSpacing: '-2px', lineHeight: 1 }}>
                                {currentWord?.word}
                            </p>
                            {missedBeat && !answered && (
                                <p style={{ color: '#ff6b6b', fontSize: '0.8rem', marginTop: '0.5rem', fontWeight: '700' }}>missed!</p>
                            )}
                        </div>
    
                        {/* Beat timer bar */}
                        <div style={{
                            width: '100%', maxWidth: '480px', height: '4px',
                            backgroundColor: 'rgba(255,255,255,0.08)', borderRadius: '2px', marginBottom: '2rem', overflow: 'hidden'
                        }}>
                            <div style={{
                                height: '100%', borderRadius: '2px',
                                backgroundColor: answered ? '#6bcb77' : '#ffd93d',
                                width: `${(beatsUntilNext / activeBeats) * 100}%`,
                                transition: `width ${BEAT_INTERVAL}ms linear`
                            }} />
                        </div>
    
                        {/* Drum pads */}
                        <div style={{
                            display: 'grid', gridTemplateColumns: '1fr 1fr',
                            gap: '1rem', width: '100%', maxWidth: '480px'
                        }}>
                            {options.map((option, i) => {
                                const isThisFeedback = feedback?.index === i;
                                const correct = feedback?.correct;
                                const bgColor = isThisFeedback
                                    ? (correct ? '#6bcb77' : '#ff6b6b')
                                    : padColors[i];
    
                                return (
                                    <button
                                        key={i}
                                        onClick={() => handleTap(i)}
                                        disabled={answered}
                                        style={{
                                            backgroundColor: answered && !isThisFeedback ? 'rgba(255,255,255,0.04)' : bgColor,
                                            border: 'none', borderRadius: '1rem',
                                            padding: '1.5rem 1rem',
                                            cursor: answered ? 'default' : 'pointer',
                                            display: 'flex', flexDirection: 'column',
                                            alignItems: 'center', justifyContent: 'center', gap: '0.5rem',
                                            boxShadow: answered && !isThisFeedback ? 'none' : `0 8px 24px ${bgColor}55`,
                                            transition: 'all 0.15s ease',
                                            transform: isThisFeedback ? 'scale(1.05)' : 'scale(1)'
                                        }}
                                    >
                                        <span style={{
                                            fontSize: '0.65rem', fontWeight: '900',
                                            letterSpacing: '2px', opacity: 0.6,
                                            color: answered && !isThisFeedback ? 'rgba(255,255,255,0.2)' : '#0d0d0d'
                                        }}>{padLabels[i]}</span>
                                        <span style={{
                                            fontSize: '1rem', fontWeight: '800',
                                            color: answered && !isThisFeedback ? 'rgba(255,255,255,0.2)' : '#0d0d0d',
                                            textAlign: 'center', lineHeight: 1.3
                                        }}>{option}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            };
        // Whack-a-Mole Mode
        const WhackAMoleMode = ({ deckKey, onBack }) => {
            const deck = getDeck(deckKey);
            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

            const MOLE_COUNT = 6;
            const ROUND_TIME = 45;

            const [currentWord, setCurrentWord] = useState(null);
            const [moles, setMoles] = useState(Array(MOLE_COUNT).fill(null));
            const [score, setScore] = useState(0);
            const [misses, setMisses] = useState(0);
            const [timeLeft, setTimeLeft] = useState(ROUND_TIME);
            const [isFinished, setIsFinished] = useState(false);
            const [whacked, setWhacked] = useState(null);
            const [wrongWhacked, setWrongWhacked] = useState(null);
            const [started, setStarted] = useState(false);
            const wordPoolRef = useRef([]);
            const moleTimersRef = useRef([]);
            const wordRef = useRef(null);

            const getNewWord = () => {
                if (wordPoolRef.current.length === 0) {
                    wordPoolRef.current = shuffle([...deck.words]);
                }
                return wordPoolRef.current.pop();
            };

            const spawnMole = (index, allMoles, correctTranslation) => {
                const isCorrect = Math.random() < 0.35;
                let text;
                if (isCorrect) {
                    text = correctTranslation;
                } else {
                    const distractors = deck.words
                        .filter(w => w.translation !== correctTranslation)
                        .map(w => w.translation);
                    text = shuffle(distractors)[0];
                }
                return { text, isCorrect, visible: true };
            };

            const rotateMole = (index) => {
                if (moleTimersRef.current[index]) clearTimeout(moleTimersRef.current[index]);
                const delay = 1200 + Math.random() * 1800;
                moleTimersRef.current[index] = setTimeout(() => {
                    setMoles(prev => {
                        const updated = [...prev];
                        const word = wordRef.current;
                        if (!word) return prev;
                        updated[index] = spawnMole(index, prev, word.translation);
                        return updated;
                    });
                    rotateMole(index);
                }, delay);
            };

            useEffect(() => {
                if (!started) return;
                wordPoolRef.current = shuffle([...deck.words]);
                const firstWord = getNewWord();
                wordRef.current = firstWord;
                setCurrentWord(firstWord);

                const initialMoles = Array(MOLE_COUNT).fill(null).map((_, i) =>
                    spawnMole(i, [], firstWord.translation)
                );
                setMoles(initialMoles);

                for (let i = 0; i < MOLE_COUNT; i++) rotateMole(i);

                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            moleTimersRef.current.forEach(clearTimeout);
                            setIsFinished(true);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);

                return () => {
                    clearInterval(timer);
                    moleTimersRef.current.forEach(clearTimeout);
                };
            }, [started]);

            const advanceWord = () => {
                const nextWord = getNewWord();
                wordRef.current = nextWord;
                setCurrentWord(nextWord);
                setMoles(prev => prev.map((_, i) =>
                    spawnMole(i, prev, nextWord.translation)
                ));
            };

            const handleWhack = (index) => {
                const mole = moles[index];
                if (!mole || !mole.visible) return;

                if (mole.isCorrect) {
                    setWhacked(index);
                    setScore(s => s + 1);
                    setTimeout(() => {
                        setWhacked(null);
                        setMoles(prev => {
                            const updated = [...prev];
                            updated[index] = { ...updated[index], visible: false };
                            return updated;
                        });
                        advanceWord();
                    }, 400);
                } else {
                    setWrongWhacked(index);
                    setMisses(m => m + 1);
                    setTimeout(() => setWrongWhacked(null), 400);
                }
            };

            const moleColors = ['#f97316','#ec4899','#8b5cf6','#06b6d4','#10b981','#f59e0b'];

            if (!started) {
                return (
                    <div style={{
                        width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                        alignItems: 'center', justifyContent: 'center',
                        background: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)'
                    }}>
                        <button onClick={onBack} style={{
                            position: 'absolute', top: '2rem', left: '2rem',
                            backgroundColor: 'rgba(255,255,255,0.15)', border: 'none', color: 'white',
                            padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer',
                            fontSize: '1rem', fontWeight: '600'
                        }}>← Back</button>
                        <div style={{ fontSize: '5rem', marginBottom: '1rem' }}>🔨</div>
                        <h1 style={{ color: 'white', fontSize: '2.5rem', fontWeight: '900', marginBottom: '0.5rem', letterSpacing: '-1px' }}>
                            Whack-a-Mole
                        </h1>
                        <p style={{ color: 'rgba(255,255,255,0.6)', marginBottom: '0.5rem', fontSize: '1.1rem', textAlign: 'center', maxWidth: '320px' }}>
                            A word appears at the top. Whack the mole showing the correct translation!
                        </p>
                        <p style={{ color: 'rgba(255,255,255,0.4)', marginBottom: '2.5rem', fontSize: '0.9rem' }}>
                            You have {ROUND_TIME} seconds
                        </p>
                        <button onClick={() => setStarted(true)} style={{
                            backgroundColor: '#f97316', color: 'white', border: 'none',
                            padding: '1rem 3rem', borderRadius: '2rem', cursor: 'pointer',
                            fontSize: '1.25rem', fontWeight: '800', letterSpacing: '1px',
                            boxShadow: '0 0 30px rgba(249,115,22,0.5)'
                        }}>
                            START
                        </button>
                    </div>
                );
            }

            if (isFinished) {
                return (
                    <div style={{
                        width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                        alignItems: 'center', justifyContent: 'center',
                        background: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)'
                    }}>
                        <div style={{
                            backgroundColor: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(10px)',
                            border: '1px solid rgba(255,255,255,0.1)',
                            padding: '3rem', borderRadius: '1.5rem',
                            textAlign: 'center', maxWidth: '380px', width: '90%'
                        }}>
                            <div style={{ fontSize: '3.5rem', marginBottom: '1rem' }}>
                                {score >= 10 ? '🏆' : score >= 5 ? '🌟' : '🔨'}
                            </div>
                            <h2 style={{ color: 'white', fontSize: '2rem', fontWeight: '900', marginBottom: '1.5rem' }}>
                                Time's Up!
                            </h2>
                            <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center', marginBottom: '2rem' }}>
                                <div style={{ backgroundColor: 'rgba(249,115,22,0.2)', border: '1px solid #f97316', borderRadius: '1rem', padding: '1rem 1.5rem' }}>
                                    <div style={{ color: '#f97316', fontSize: '2rem', fontWeight: '900' }}>{score}</div>
                                    <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: '0.8rem' }}>WHACKED</div>
                                </div>
                                <div style={{ backgroundColor: 'rgba(239,68,68,0.2)', border: '1px solid #ef4444', borderRadius: '1rem', padding: '1rem 1.5rem' }}>
                                    <div style={{ color: '#ef4444', fontSize: '2rem', fontWeight: '900' }}>{misses}</div>
                                    <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: '0.8rem' }}>MISSES</div>
                                </div>
                            </div>
                            <button onClick={onBack} style={{
                                backgroundColor: '#f97316', color: 'white', border: 'none',
                                padding: '0.85rem 2.5rem', borderRadius: '2rem', cursor: 'pointer',
                                fontWeight: '800', fontSize: '1rem'
                            }}>
                                Back to Menu
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{
                    width: '100%', height: '100vh', display: 'flex', flexDirection: 'column',
                    alignItems: 'center',
                    background: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
                    padding: '1.5rem', userSelect: 'none'
                }}>
                    {/* Header */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', width: '100%', maxWidth: '520px', marginBottom: '1.5rem' }}>
                        <button onClick={onBack} style={{
                            backgroundColor: 'rgba(255,255,255,0.1)', border: 'none', color: 'white',
                            padding: '0.4rem 0.9rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: '600'
                        }}>← Back</button>
                        <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                            <span style={{ color: '#f97316', fontWeight: '800', fontSize: '1.1rem' }}>⚡ {score}</span>
                            <span style={{ color: '#ef4444', fontWeight: '800', fontSize: '1.1rem' }}>✗ {misses}</span>
                            <span style={{
                                color: timeLeft <= 10 ? '#ef4444' : 'white',
                                fontWeight: '900', fontSize: '1.25rem',
                                animation: timeLeft <= 10 ? 'pulse 1s infinite' : 'none'
                            }}>⏱ {timeLeft}s</span>
                        </div>
                    </div>

                    {/* Word to translate */}
                    <div style={{
                        backgroundColor: 'rgba(255,255,255,0.08)',
                        border: '2px solid rgba(249,115,22,0.5)',
                        borderRadius: '1.25rem', padding: '1.25rem 2.5rem',
                        marginBottom: '2rem', textAlign: 'center',
                        boxShadow: '0 0 30px rgba(249,115,22,0.15)'
                    }}>
                        <p style={{ color: 'rgba(255,255,255,0.4)', fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '2px', marginBottom: '0.25rem' }}>
                            Whack the correct translation of
                        </p>
                        <p style={{ color: 'white', fontSize: '2.5rem', fontWeight: '900', letterSpacing: '-1px' }}>
                            {currentWord?.word}
                        </p>
                    </div>

                    {/* Mole grid */}
                    <div style={{
                        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
                        gap: '1rem', width: '100%', maxWidth: '520px'
                    }}>
                        {moles.map((mole, i) => {
                            const isWhacked = whacked === i;
                            const isWrong = wrongWhacked === i;
                            const color = moleColors[i];
                            return (
                                <div
                                    key={i}
                                    onClick={() => handleWhack(i)}
                                    style={{
                                        position: 'relative', height: '100px',
                                        cursor: mole?.visible ? 'pointer' : 'default',
                                        display: 'flex', alignItems: 'flex-end', justifyContent: 'center'
                                    }}
                                >
                                    {/* Hole */}
                                    <div style={{
                                        position: 'absolute', bottom: 0,
                                        width: '100%', height: '28px',
                                        backgroundColor: '#0a0a1a',
                                        borderRadius: '50%',
                                        border: '2px solid rgba(255,255,255,0.05)'
                                    }} />
                                    {/* Mole */}
                                    <div style={{
                                        position: 'absolute',
                                        bottom: isWhacked ? '-20px' : isWrong ? '20px' : mole?.visible ? '18px' : '-10px',
                                        transition: 'bottom 0.2s ease',
                                        width: '76px', height: '76px',
                                        borderRadius: '50% 50% 45% 45%',
                                        backgroundColor: isWhacked ? '#10b981' : isWrong ? '#ef4444' : color,
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        boxShadow: `0 4px 20px ${color}66`,
                                        border: `3px solid ${isWhacked ? '#10b981' : isWrong ? '#ef4444' : color}`,
                                        zIndex: 2
                                    }}>
                                        {/* Eyes */}
                                        <div style={{ position: 'absolute', top: '20px', display: 'flex', gap: '14px' }}>
                                            <div style={{ width: '8px', height: '8px', backgroundColor: isWhacked ? '#fff' : '#1a1a2e', borderRadius: '50%' }} />
                                            <div style={{ width: '8px', height: '8px', backgroundColor: isWhacked ? '#fff' : '#1a1a2e', borderRadius: '50%' }} />
                                        </div>
                                        {/* Label */}
                                        <div style={{
                                            position: 'absolute', bottom: '-32px',
                                            backgroundColor: 'rgba(0,0,0,0.75)',
                                            color: 'white', fontSize: '0.75rem', fontWeight: '700',
                                            padding: '3px 8px', borderRadius: '6px',
                                            whiteSpace: 'nowrap', maxWidth: '90px',
                                            overflow: 'hidden', textOverflow: 'ellipsis',
                                            textAlign: 'center'
                                        }}>
                                            {mole?.text}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };
        
        // Penguin Game Mode (integrated from original code)
        const PenguinGameMode = ({ deckKey, onBack }) => {
            const deck = getDeck(deckKey);
            const [drops, setDrops] = useState([]);
            const [score, setScore] = useState(0);
            const [misses, setMisses] = useState(0);
            const [selectedDrop, setSelectedDrop] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [gameWon, setGameWon] = useState(false);
            const [penguinPos, setPenguinPos] = useState(10);
            const [penguinDirection, setPenguinDirection] = useState(1);
            const dropIdRef = useRef(0);
            const spawnTimerRef = useRef(null);
            const checkTimerRef = useRef(null);

            const createDrop = (type = null, matchIndex = null, existingDrops = []) => {
                let text, dropType, matchData;
                const index = matchIndex !== null ? matchIndex : Math.floor(Math.random() * deck.words.length);

                if (type === 'word' || (!type && Math.random() > 0.5)) {
                    text = deck.words[index].word;
                    dropType = 'word';
                    matchData = { index };
                } else {
                    text = deck.words[index].translation;
                    dropType = 'translation';
                    matchData = { index };
                }

                const position = findValidPosition(existingDrops, 15);

                return {
                    id: dropIdRef.current++,
                    text,
                    type: dropType,
                    matchData,
                    x: position.x,
                    y: position.y,
                    selected: false
                };
            };

            const getCurrentSpeed = () => {
                const speedIncrease = Math.floor(score / 10) * 0.03;
                return 0.12 + speedIncrease;
            };

            const getSpawnInterval = () => {
                if (score < 30) {
                    return 5000;
                }
                const level = Math.floor((score - 30) / 10);
                return Math.max(1600, 4000 - (level * 300));
            };

            const isPositionTooClose = (x, y, existingDrops, minDistance = 15) => {
                return existingDrops.some(drop => {
                    const distance = Math.sqrt(Math.pow(drop.x - x, 2) + Math.pow(drop.y - y, 2));
                    return distance < minDistance;
                });
            };

            const findValidPosition = (existingDrops, minDistance = 15) => {
                let attempts = 0;
                let x, y;
                do {
                    x = Math.random() * 70 + 10;
                    y = -10 - Math.random() * 20;
                    attempts++;
                } while (isPositionTooClose(x, y, existingDrops, minDistance) && attempts < 100);
                return { x, y };
            };

            const hasMatchingPair = (drop, allDrops) => {
                return allDrops.some(otherDrop => {
                    if (otherDrop.id === drop.id) return false;
                    if (drop.type === otherDrop.type) return false;
                    return drop.matchData.index === otherDrop.matchData.index;
                });
            };

            const ensureMatchExists = () => {
                setDrops(prev => {
                    const dropsAtHalf = prev.filter(d => d.y >= 50 && d.y < 55);
                    
                    for (let drop of dropsAtHalf) {
                        if (!hasMatchingPair(drop, prev)) {
                            const matchType = drop.type === 'word' ? 'translation' : 'word';
                            const matchDrop = createDrop(matchType, drop.matchData.index, prev);
                            return [...prev, matchDrop];
                        }
                    }
                    return prev;
                });
            };

            useEffect(() => {
                if (gameOver || gameWon) return;

                const moveInterval = setInterval(() => {
                    setPenguinPos(prev => {
                        const next = prev + penguinDirection * 1.2;
                        if (next > 90 || next < 10) {
                            setPenguinDirection(d => -d);
                            return prev;
                        }
                        return next;
                    });
                }, 50);

                return () => clearInterval(moveInterval);
            }, [gameOver, gameWon, penguinDirection]);

            useEffect(() => {
                if (gameOver || gameWon) return;

                let firstDropRef = null;

                const spawnDrop = () => {
                    setDrops(prev => {
                        const newDrop = createDrop(null, null, prev);
                        firstDropRef = newDrop;
                        return [...prev, newDrop];
                    });
                    
                    setTimeout(() => {
                        setDrops(prev => {
                            if (!firstDropRef) return prev;
                            const matchType = firstDropRef.type === 'word' ? 'translation' : 'word';
                            const matchDrop = createDrop(matchType, firstDropRef.matchData.index, prev);
                            firstDropRef = null;
                            return [...prev, matchDrop];
                        });
                    }, 1000 + Math.random() * 2000);
                };

                spawnDrop();
                spawnTimerRef.current = setInterval(spawnDrop, getSpawnInterval());

                return () => {
                    if (spawnTimerRef.current) clearInterval(spawnTimerRef.current);
                };
            }, [gameOver, gameWon, score]);

            useEffect(() => {
                if (gameOver || gameWon) return;

                checkTimerRef.current = setInterval(ensureMatchExists, 100);

                return () => {
                    if (checkTimerRef.current) clearInterval(checkTimerRef.current);
                };
            }, [gameOver, gameWon, drops]);

            useEffect(() => {
                if (gameOver || gameWon) return;

                const interval = setInterval(() => {
                    setDrops(prev => {
                        const updated = prev.map(drop => ({
                            ...drop,
                            y: drop.y + getCurrentSpeed()
                        }));

                        const landed = updated.filter(d => d.y >= 95);
                        if (landed.length > 0) {
                            setMisses(m => {
                                const newMisses = m + landed.length;
                                if (newMisses >= 3) {
                                    setGameOver(true);
                                    if (spawnTimerRef.current) clearInterval(spawnTimerRef.current);
                                }
                                return newMisses;
                            });
                            return updated.filter(d => d.y < 95);
                        }

                        return updated;
                    });
                }, 50);

                return () => clearInterval(interval);
            }, [gameOver, gameWon, score]);

            const handleDropClick = (drop) => {
                if (gameOver || gameWon) return;

                if (!selectedDrop) {
                    setSelectedDrop(drop);
                    setDrops(prev => prev.map(d => 
                        d.id === drop.id ? { ...d, selected: true } : d
                    ));
                } else {
                    if (selectedDrop.id === drop.id) {
                        setSelectedDrop(null);
                        setDrops(prev => prev.map(d => 
                            d.id === drop.id ? { ...d, selected: false } : d
                        ));
                        return;
                    }

                    if (selectedDrop.type === drop.type) {
                        setSelectedDrop(drop);
                        setDrops(prev => prev.map(d => {
                            if (d.id === drop.id) return { ...d, selected: true };
                            if (d.id === selectedDrop.id) return { ...d, selected: false };
                            return d;
                        }));
                        return;
                    }

                    if (selectedDrop.matchData.index === drop.matchData.index) {
                        setDrops(prev => prev.filter(d => 
                            d.id !== selectedDrop.id && d.id !== drop.id
                        ));
                        setScore(s => {
                            const newScore = s + 1;
                            if (newScore >= 100) {
                                setGameWon(true);
                                if (spawnTimerRef.current) clearInterval(spawnTimerRef.current);
                            }
                            return newScore;
                        });
                        setSelectedDrop(null);
                    } else {
                        setSelectedDrop(null);
                        setDrops(prev => prev.map(d => ({ ...d, selected: false })));
                    }
                }
            };

            const Penguin = () => (
                <svg width="140" height="120" viewBox="0 0 140 120" style={{ transform: penguinDirection === 1 ? 'scaleX(1)' : 'scaleX(-1)' }}>
                    <ellipse cx="70" cy="112" rx="30" ry="6" fill="#000" opacity="0.2" />
                    <ellipse cx="70" cy="75" rx="35" ry="42" fill="#2c3e50" />
                    <ellipse cx="72" cy="78" rx="26" ry="35" fill="#ecf0f1" />
                    <ellipse cx="45" cy="65" rx="8" ry="22" fill="#2c3e50" />
                    <ellipse cx="85" cy="50" rx="18" ry="16" fill="#2c3e50" />
                    <ellipse cx="88" cy="52" rx="14" ry="12" fill="#ecf0f1" />
                    <circle cx="92" cy="50" r="6" fill="#000" />
                    <circle cx="93" cy="49" r="2" fill="#fff" />
                    <path d="M 100 58 L 108 60 L 106 64 L 100 62 Z" fill="#ff8c42" />
                    <path d="M 102 60 L 106 61 L 105 63 L 102 62 Z" fill="#ffa500" />
                    <ellipse cx="58" cy="105" rx="16" ry="8" fill="#ff8c42" style={{ animation: 'bounce 0.4s ease-in-out infinite' }} />
                    <path d="M 50 105 L 45 110 L 52 108 Z" fill="#ffa500" />
                    <path d="M 58 105 L 54 110 L 60 108 Z" fill="#ffa500" />
                    <path d="M 66 105 L 63 110 L 68 108 Z" fill="#ffa500" />
                    <ellipse cx="82" cy="105" rx="16" ry="8" fill="#ff8c42" style={{ animation: 'bounce 0.4s ease-in-out infinite 0.2s' }} />
                    <path d="M 74 105 L 69 110 L 76 108 Z" fill="#ffa500" />
                    <path d="M 82 105 L 78 110 L 84 108 Z" fill="#ffa500" />
                    <path d="M 90 105 L 87 110 L 92 108 Z" fill="#ffa500" />
                    <ellipse cx="72" cy="90" rx="8" ry="10" fill="#fff" opacity="0.3" />
                </svg>
            );

            return (
                <div style={{
                    width: '100%',
                    height: '100vh',
                    background: 'linear-gradient(to bottom, #475569, #64748b, #6b7280)',
                    position: 'relative',
                    overflow: 'hidden'
                }}>
                    <button
                        onClick={onBack}
                        style={{
                            position: 'absolute',
                            bottom: '2rem',
                            left: '2rem',
                            backgroundColor: 'rgba(255,255,255,0.2)',
                            border: 'none',
                            color: 'white',
                            padding: '0.5rem 1rem',
                            borderRadius: '0.5rem',
                            cursor: 'pointer',
                            fontSize: '1rem',
                            fontWeight: '600',
                            transition: 'all 0.3s ease',
                            zIndex: 100
                        }}
                        onMouseOver={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.3)'}
                        onMouseOut={(e) => e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.2)'}
                    >
                        ← Back
                    </button>

                    <div style={{
                        position: 'absolute',
                        top: '2rem',
                        left: '1rem',
                        color: 'white',
                        fontSize: '1.25rem',
                        fontWeight: 'bold',
                        backgroundColor: 'rgba(0,0,0,0.5)',
                        padding: '0.5rem 1rem',
                        borderRadius: '0.5rem',
                        zIndex: 50
                    }}>
                        Score: {score}/100
                    </div>
                    <div style={{
                        position: 'absolute',
                        top: '1rem',
                        right: '1rem',
                        color: 'white',
                        fontSize: '1.25rem',
                        fontWeight: 'bold',
                        backgroundColor: 'rgba(0,0,0,0.5)',
                        padding: '0.5rem 1rem',
                        borderRadius: '0.5rem',
                        zIndex: 50
                    }}>
                        Misses: {misses}/3
                    </div>

                    {drops.map(drop => (
                        <div
                            key={drop.id}
                            onClick={() => handleDropClick(drop)}
                            style={{
                                position: 'absolute',
                                cursor: 'pointer',
                                transition: 'all 0.2s',
                                left: `${drop.x}%`,
                                top: `${drop.y}%`,
                                transform: `translate(-50%, -50%) scale(${drop.selected ? 1.1 : 1})`
                            }}
                            onMouseOver={(e) => {
                                if (!drop.selected) e.currentTarget.style.transform = `translate(-50%, -50%) scale(1.05)`;
                            }}
                            onMouseOut={(e) => {
                                if (!drop.selected) e.currentTarget.style.transform = `translate(-50%, -50%) scale(1)`;
                            }}
                        >
                            <div style={{ position: 'relative', animation: drop.selected ? 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite' : 'none' }}>
                                <svg width="80" height="100" viewBox="0 0 80 100" style={{ filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.3))' }}>
                                    <path 
                                        d="M40 5 C20 25, 10 40, 10 60 C10 78, 23 92, 40 92 C57 92, 70 78, 70 60 C70 40, 60 25, 40 5 Z" 
                                        fill={drop.selected ? '#fbbf24' : '#60a5fa'}
                                        stroke={drop.selected ? '#f59e0b' : '#3b82f6'}
                                        strokeWidth="2"
                                    />
                                </svg>
                                <div style={{
                                    position: 'absolute',
                                    inset: 0,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '0.875rem',
                                    fontWeight: '900',
                                    color: 'white',
                                    textShadow: '2px 2px 4px rgba(0,0,0,0.8), -1px -1px 2px rgba(0,0,0,0.6)',
                                    fontFamily: 'Arial, sans-serif',
                                    letterSpacing: '0.5px',
                                    padding: '0 10px',
                                    textAlign: 'center'
                                }}>
                                    {drop.text}
                                </div>
                            </div>
                        </div>
                    ))}

                    <div style={{
                        position: 'absolute',
                        bottom: '2rem',
                        left: `${penguinPos}%`,
                        transform: 'translateX(-50%)',
                        transition: 'all 0.3s ease-linear'
                    }}>
                        <Penguin />
                    </div>

                    {(gameOver || gameWon) && (
                        <div style={{
                            position: 'absolute',
                            inset: 0,
                            backgroundColor: 'rgba(0,0,0,0.7)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            zIndex: 200
                        }}>
                            <div style={{
                                backgroundColor: 'white',
                                padding: '2rem',
                                borderRadius: '0.5rem',
                                textAlign: 'center'
                            }}>
                                <h2 style={{
                                    fontSize: '1.875rem',
                                    fontWeight: 'bold',
                                    marginBottom: '1rem'
                                }}>
                                    {gameWon ? 'Congratulations! 🎉' : 'Game Over! 😿'}
                                </h2>
                                <p style={{
                                    fontSize: '1.25rem',
                                    marginBottom: '1.5rem'
                                }}>
                                    {gameWon 
                                        ? 'You made it home safe!' 
                                        : 'The penguin doesn\'t like the rain!'}
                                </p>
                                <p style={{
                                    fontSize: '1.125rem',
                                    marginBottom: '1.5rem'
                                }}>
                                    Final Score: {score}/100
                                </p>
                                <button
                                    onClick={onBack}
                                    style={{
                                        backgroundColor: '#667eea',
                                        color: 'white',
                                        padding: '0.75rem 1.5rem',
                                        borderRadius: '0.5rem',
                                        border: 'none',
                                        cursor: 'pointer',
                                        transition: 'background-color 0.2s'
                                    }}
                                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = '#764ba2'}
                                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = '#667eea'}
                                >
                                    Back to Modes
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Main App Component
        const VocabApp = () => {
            const [page, setPage] = useState('home');
            const [selectedDeck, setSelectedDeck] = useState(null);

            const handleSelectDeck = (deckKey) => {
                setSelectedDeck(deckKey);
                setPage('modes');
            };

            const handleSelectMode = (modeId) => {
                setPage(modeId);
            };

            const handleBack = (destination = 'modes') => {
                if (destination === 'modes') {
                    setPage('modes');
                } else {
                    setSelectedDeck(null);
                    setPage('home');
                }
            };

            switch (page) {
                case 'home':
                    return <HomePage onSelectDeck={handleSelectDeck} />;
                case 'modes':
                    return <ModeSelectionPage deckKey={selectedDeck} onSelectMode={handleSelectMode} onBack={() => handleBack('home')} />;
                case 'multiple-choice':
                    return <MultipleChoiceMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'type-answer':
                    return <TypeAnswerMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'handwrite':
                    return <HandwriteMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'penguin-game':
                    return <PenguinGameMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'whack-a-mole':
                    return <WhackAMoleMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'drum-machine':
                    return <DrumMachineMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                case 'flappy-bird':
                    return <FlappyBirdMode deckKey={selectedDeck} onBack={() => handleBack('modes')} />;
                default:
                    return <HomePage onSelectDeck={handleSelectDeck} />;
            }
        };

        ReactDOM.render(<VocabApp />, document.getElementById('root'));
    </script>
</body>
</html>
