<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="Flashcards"/>
    <meta name="theme-color" content="#ffffff"/>
    <title>Flashcards</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #ffffff; --bg2: #f5f5f5; --bg3: #e8e8e8;
            --text: #111111; --text2: #666666;
            --border: rgba(0,0,0,0.13);
            --green-bg: #e8f5e9; --green-text: #2e7d32; --green-border: #a5d6a7;
            --red-bg: #ffebee; --red-text: #c62828; --red-border: #ef9a9a;
            --radius: 12px; --radius-sm: 8px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a; --bg2: #252525; --bg3: #333333;
                --text: #f0f0f0; --text2: #999999;
                --border: rgba(255,255,255,0.12);
                --green-bg: #1b3a1c; --green-text: #81c784; --green-border: #388e3c;
                --red-bg: #3b1a1a; --red-text: #ef9a9a; --red-border: #c62828;
            }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; background: var(--bg); color: var(--text); min-height: 100vh; margin: 0; }
        #root { display: flex; flex-direction: column; min-height: 100vh; }
        .screen { padding: 16px; max-width: 500px; margin: 0 auto; width: 100%; padding-top: max(env(safe-area-inset-top), 16px); padding-bottom: max(env(safe-area-inset-bottom), 16px); }
        .page-header { padding: 8px 0 18px; }
        h1 { font-size: 22px; font-weight: 600; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
        .subtitle { font-size: 14px; color: var(--text2); margin-top: 3px; }
        .back-btn { background: none; border: none; color: var(--text2); font-size: 14px; cursor: pointer; padding: 0 0 14px; display: flex; align-items: center; gap: 4px; font-family: inherit; }
        .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; }
        .card:active { background: var(--bg2); }
        .card-title { font-weight: 500; font-size: 16px; }
        .card-meta { font-size: 12px; color: var(--text2); margin-top: 5px; line-height: 1.7; }
        .mode-btn { display: block; width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; text-align: left; }
        .mode-btn:active { background: var(--bg2); }
        .mode-name { font-weight: 500; }
        .mode-desc { font-size: 13px; color: var(--text2); margin-top: 3px; }
        .dir-toggle { display: flex; margin-bottom: 18px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
        .dir-toggle button { flex: 1; padding: 10px 8px; border: none; background: var(--bg); color: var(--text2); font-size: 13px; font-family: inherit; cursor: pointer; }
        .dir-toggle button.active { background: var(--text); color: var(--bg); }
        .dir-toggle button:first-child { border-right: 1px solid var(--border); }
        .flashcard { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 24px; text-align: center; min-height: 155px; display: flex; flex-direction: column; justify-content: center; margin-bottom: 16px; }
        .card-word { font-size: 30px; font-weight: 600; line-height: 1.3; }
        .card-hint { font-size: 13px; color: var(--text2); margin-top: 10px; }
        .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .progress-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
        .score-bar-wrap { flex: 1; background: var(--bg3); border-radius: 4px; height: 6px; }
        .score-bar { background: var(--text); border-radius: 4px; height: 6px; transition: width 0.3s; }
        .choice-btn { display: block; width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; margin-bottom: 8px; cursor: pointer; text-align: left; }
        .choice-btn:disabled { cursor: default; opacity: 0.6; }
        .choice-btn.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
        .choice-btn.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
        .primary-btn { display: block; width: 100%; padding: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); font-size: 15px; font-family: inherit; color: var(--text); cursor: pointer; margin-bottom: 8px; }
        .primary-btn:active { background: var(--bg2); }
        .primary-btn.accent { background: var(--text); color: var(--bg); border-color: var(--text); }
        .primary-btn.accent:active { opacity: 0.8; }
        .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-row .primary-btn { margin-bottom: 0; }
        .result-msg { font-size: 14px; color: var(--text2); margin: 10px 0 4px; min-height: 20px; line-height: 1.5; }
        .results-score { font-size: 56px; font-weight: 700; text-align: center; margin: 28px 0 6px; }
        .results-sub { text-align: center; color: var(--text2); font-size: 14px; margin-bottom: 32px; }
        /* Matching game styles */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
        .match-card { padding: 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); text-align: center; cursor: pointer; user-select: none; background: var(--bg2); transition: all 0.2s; }
        .match-card:hover { border-color: var(--text); }
        .match-card.selected { border-color: var(--text); background: var(--bg3); }
        .match-card.matched { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); cursor: default; }
        .match-card.wrong { background: var(--red-bg); border-color: var(--red-border); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .pw-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; }
        .pw-screen h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
        .pw-screen p { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
        #pw-input { width: 100%; max-width: 320px; padding: 13px 14px; font-size: 16px; font-family: inherit; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; }
        #pw-input:focus { border-color: var(--text2); outline: none; }
        #pw-btn { width: 100%; max-width: 320px; padding: 13px; font-size: 15px; font-weight: 500; font-family: inherit; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); cursor: pointer; }
        #pw-error { font-size: 13px; color: var(--red-text); margin-top: 10px; min-height: 18px; }
    </style>
</head>\n<body>\n    <div id="root"></div>\n    <script>\n        const { useState, useEffect, useRef, useCallback } = React;\n\n        const PASSWORD = 'changeme';\n        const LANGS = {\n            Polish:   { code: 'pl-PL',  flag: '🇵🇱' },\n            Tagalog:  { code: 'fil-PH', flag: '🇵🇭' },\n            Chinese:  { code: 'zh-CN',  flag: '🇨🇳' },\n            Japanese: { code: 'ja-JP',  flag: '🇯🇵' }\n        };\n\n        const DECKS = {\n            Polish: [\n                { id: 'pl-basics', name: 'Basics', frontLabel: 'English', backLabel: 'Polish', cards: [\n                    {front:'apple',back:'jabłko'},{front:'water',back:'woda'},{front:'house',back:'dom'},\n                    {front:'cat',back:'kot'},{front:'dog',back:'pies'},{front:'book',back:'książka'},\n                    {front:'bread',back:'chleb'},{front:'sun',back:'słońce'},{front:'friend',back:'przyjaciel'},{front:'thank you',back:'dziękuję'}\n                ]},\n                { id: 'pl-numbers', name: 'Numbers', frontLabel: 'English', backLabel: 'Polish', cards: [\n                    {front:'one',back:'jeden'},{front:'two',back:'dwa'},{front:'three',back:'trzy'},\n                    {front:'four',back:'cztery'},{front:'five',back:'pięć'},{front:'six',back:'sześć'},\n                    {front:'seven',back:'siedem'},{front:'eight',back:'osiem'},{front:'nine',back:'dziewięć'},{front:'ten',back:'dziesięć'}\n                ]}\n            ],\n            Tagalog: [\n                { id: 'tl-basics', name: 'Basics', frontLabel: 'English', backLabel: 'Tagalog', cards: [\n                    {front:'water',back:'tubig'},{front:'food',back:'pagkain'},{front:'house',back:'bahay'},\n                    {front:'person',back:'tao'},{front:'dog',back:'aso'},{front:'cat',back:'pusa'},\n                    {front:'friend',back:'kaibigan'},{front:'good morning',back:'magandang umaga'},{front:'thank you',back:'salamat'},{front:'yes',back:'oo'}\n                ]},\n                { id: 'tl-colors', name: 'Colors', frontLabel: 'English', backLabel: 'Tagalog', cards: [\n                    {front:'red',back:'pula'},{front:'blue',back:'asul'},{front:'green',back:'berde'},\n                    {front:'white',back:'puti'},{front:'black',back:'itim'},{front:'yellow',back:'dilaw'},\n                    {front:'orange',back:'kahel'},{front:'pink',back:'rosas'},{front:'purple',back:'lila'},{front:'brown',back:'kayumanggi'}\n                ]}\n            ],\n            Chinese: [\n                { id: 'zh-basics', name: 'Basics', frontLabel: 'English', backLabel: 'Chinese', cards: [\n                    {front:'water',back:'水 (shuǐ)'},{front:'fire',back:'火 (huǒ)'},{front:'person',back:'人 (rén)'},\n                    {front:'mountain',back:'山 (shān)'},{front:'sun',back:'太阳 (tàiyáng)'},{front:'moon',back:'月 (yuè)'},\n                    {front:'tree',back:'树 (shù)'},{front:'cat',back:'猫 (māo)'},{front:'dog',back:'狗 (gǒu)'},{front:'thank you',back:'谢谢 (xièxie)'}\n                ]},\n                { id: 'zh-numbers', name: 'Numbers', frontLabel: 'English', backLabel: 'Chinese', cards: [\n                    {front:'one',back:'一 (yī)'},{front:'two',back:'二 (èr)'},{front:'three',back:'三 (sān)'},\n                    {front:'four',back:'四 (sì)'},{front:'five',back:'五 (wǔ)'},{front:'six',back:'六 (liù)'},\n                    {front:'seven',back:'七 (qī)'},{front:'eight',back:'八 (bā)'},{front:'nine',back:'九 (jiǔ)'},{front:'ten',back:'十 (shí)'}\n                ]}\n            ],\n            Japanese: [\n                { id: 'ja-basics', name: 'Basics', frontLabel: 'English', backLabel: 'Japanese', cards: [\n                    {front:'water',back:'水 (mizu)'},{front:'fire',back:'火 (hi)'},{front:'person',back:'人 (hito)'},\n                    {front:'cat',back:'猫 (neko)'},{front:'dog',back:'犬 (inu)'},{front:'book',back:'本 (hon)'},\n                    {front:'mountain',back:'山 (yama)'},{front:'river',back:'川 (kawa)'},{front:'thank you',back:'ありがとう (arigatō)'},{front:'yes',back:'はい (hai)'}\n                ]},\n                { id: 'ja-colors', name: 'Colors', frontLabel: 'English', backLabel: 'Japanese', cards: [\n                    {front:'red',back:'赤 (aka)'},{front:'blue',back:'青 (ao)'},{front:'white',back:'白 (shiro)'},\n                    {front:'black',back:'黒 (kuro)'},{front:'yellow',back:'黄色 (kiiro)'},{front:'green',back:'緑 (midori)'},\n                    {front:'pink',back:'ピンク (pinku)'},{front:'orange',back:'オレンジ (orenji)'},{front:'purple',back:'紫 (murasaki)'},{front:'brown',back:'茶色 (chairo)'}\n                ]}\n            ]\n        };\n\n        // PasswordScreen Component\n        const PasswordScreen = ({ onUnlock }) => {\n            const [password, setPassword] = useState('');\n            const [error, setError] = useState('');\n\n            const handleCheck = () => {\n                if (password === PASSWORD) {\n                    sessionStorage.setItem('fc_auth', '1');\n                    onUnlock();\n                } else {\n                    setError('Incorrect password.');\n                    setPassword('');\n                }\n            };\n\n            return (\n                <div className="pw-screen">\n                    <h1>Flashcards</h1>\n                    <p>Enter your password to continue</p>\n                    <input\n                        id="pw-input"\n                        type="password"\n                        placeholder="Password"\n                        value={password}\n                        onChange={(e) => setPassword(e.target.value)}\n                        onKeyDown={(e) => e.key === 'Enter' && handleCheck()}\n                        autoComplete="current-password"\n                    />\n                    <button id="pw-btn" onClick={handleCheck}>Unlock</button>\n                    {error && <div id="pw-error">{error}</div>}\n                </div>\n            );\n        };\n\n        // Main App Component\n        const App = () => {\n            const [isAuthenticated, setIsAuthenticated] = useState(() => sessionStorage.getItem('fc_auth') === '1');\n            const [currentScreen, setCurrentScreen] = useState('home');\n            const [currentLang, setCurrentLang] = useState(null);\n            const [currentDeck, setCurrentDeck] = useState(null);\n            const [currentDir, setCurrentDir] = useState('front');\n            const [currentMode, setCurrentMode] = useState(null);\n            const [stats, setStats] = useState(() => {\n                try {\n                    return JSON.parse(localStorage.getItem('fc_stats') || '{}');\n                } catch (e) {\n                    return {};\n                }\n            });\n\n            const saveStats = useCallback((newStats) => {\n                setStats(newStats);\n                localStorage.setItem('fc_stats', JSON.stringify(newStats));\n            }, []);\n\n            const fmtDate = (ts) => {\n                if (!ts) return null;\n                const diff = (Date.now() - ts) / 86400000;\n                if (diff < 1) return 'Today';\n                if (diff < 2) return 'Yesterday';\n                return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });\n            };\n\n            if (!isAuthenticated) {\n                return <PasswordScreen onUnlock={() => setIsAuthenticated(true)} />;\n            }\n\n            const renderScreen = () => {\n                if (currentScreen === 'home') {\n                    return (\n                        <div className=\"screen\">\n                            <div className=\"page-header\">\n                                <h1>Flashcards</h1>\n                                <div className=\"subtitle\">Choose a language to study</div>\n                            </div>\n                            {Object.entries(DECKS).map(([lang, decks]) => (\n                                <div key={lang} className=\"card\" onClick={() => { setCurrentLang(lang); setCurrentScreen('decks'); }}>\n                                    <div className=\"card-title\">{LANGS[lang].flag} {lang}</div>\n                                    <div className=\"card-meta\">{decks.length} deck{decks.length > 1 ? 's' : ''}</div>\n                                </div>\n                            ))}\n                        </div>\n                    );\n                }\n                if (currentScreen === 'decks' && currentLang) {\n                    return (\n                        <div className=\"screen\">\n                            <button className=\"back-btn\" onClick={() => setCurrentScreen('home')}>← back</button>\n                            <h2>{LANGS[currentLang].flag} {currentLang}</h2>\n                            {DECKS[currentLang].map(deck => {\n                                const s = stats[deck.id];\n                                return (\n                                    <div key={deck.id} className=\"card\" onClick={() => { setCurrentDeck(deck); setCurrentScreen('direction'); }}>\n                                        <div className=\"card-title\">{deck.name}</div>\n                                        <div className=\"card-meta\">\n                                            {deck.cards.length} cards<br/>\n                                            {s ? `Last practiced: ${fmtDate(s.lastPracticed)}\\nLast score: ${s.lastScore}%` : 'Not yet practiced'}\n                                        </div>\n                                    </div>\n                                );\n                            })}\n                        </div>\n                    );\n                }\n                if (currentScreen === 'direction' && currentDeck) {\n                    return (\n                        <div className=\"screen\">\n                            <button className=\"back-btn\" onClick={() => setCurrentScreen('decks')}>← back</button>\n                            <h2>{currentDeck.name}</h2>\n                            <p className=\"subtitle\" style={{marginBottom: '16px'}}>Which direction do you want to practice?</p>\n                            <button className=\"mode-btn\" onClick={() => { setCurrentDir('front'); setCurrentScreen('modes'); }}>\n                                <div className=\"mode-name\">{currentDeck.frontLabel} → {currentDeck.backLabel}</div>\n                                <div className=\"mode-desc\">See {currentDeck.frontLabel}, answer in {currentDeck.backLabel}</div>\n                            </button>\n                            <button className=\"mode-btn\" onClick={() => { setCurrentDir('back'); setCurrentScreen('modes'); }}>\n                                <div className=\"mode-name\">{currentDeck.backLabel} → {currentDeck.frontLabel}</div>\n                                <div className=\"mode-desc\">See {currentDeck.backLabel}, answer in {currentDeck.frontLabel}</div>\n                            </button>\n                        </div>\n                    );\n                }\n                if (currentScreen === 'modes' && currentDeck) {\n                    return (\n                        <div className=\"screen\">\n                            <button className=\"back-btn\" onClick={() => setCurrentScreen('direction')}>← back</button>\n                            <h2>{currentDeck.name}</h2>\n                            <div className=\"dir-toggle\">\n                                <button className={`${currentDir === 'front' ? 'active' : ''}`} onClick={() => setCurrentDir('front')}>\n                                    {currentDeck.frontLabel} → {currentDeck.backLabel}\n                                </button>\n                                <button className={`${currentDir === 'back' ? 'active' : ''}`} onClick={() => setCurrentDir('back')}>\n                                    {currentDeck.backLabel} → {currentDeck.frontLabel}\n                                </button>\n                            </div>\n                            <p className=\"subtitle\" style={{marginBottom: '16px'}}>Choose a practice mode</p>\n                            <button className=\"mode-btn\" onClick={() => { setCurrentMode('multiple'); setCurrentScreen('practice'); }}>\n                                <div className=\"mode-name\">Multiple choice</div>\n                                <div className=\"mode-desc\">Pick the correct answer from 4 options</div>\n                            </button>\n                            <button className=\"mode-btn\" onClick={() => { setCurrentMode('type'); setCurrentScreen('practice'); }}>\n                                <div className=\"mode-name\">Type the answer</div>\n                                <div className=\"mode-desc\">Type the translation from memory</div>\n                            </button>\n                            <button className=\"mode-btn\" onClick={() => { setCurrentMode('write'); setCurrentScreen('practice'); }}>\n                                <div className=\"mode-name\">Write by hand</div>\n                                <div className=\"mode-desc\">Draw the answer with your finger or stylus</div>\n                            </button>\n                            <button className=\"mode-btn\" onClick={() => { setCurrentMode('audio'); setCurrentScreen('practice'); }}>\n                                <div className=\"mode-name\">Audio</div>\n                                <div className=\"mode-desc\">Listen and speak the answer</div>\n                            </button>\n                            <button className=\"mode-btn\" onClick={() => { setCurrentMode('matching'); setCurrentScreen('practice'); }}>\n                                <div className=\"mode-name\">Matching</div>\n                                <div className=\"mode-desc\">Match vocabulary pairs together</div>\n                            </button>\n                        </div>\n                    );\n                }\n                if (currentScreen === 'practice' && currentDeck && currentMode) {\n                    return <PracticeScreen deck={currentDeck} mode={currentMode} direction={currentDir} langs={LANGS} currentLang={currentLang} onComplete={(score) => {\n                        const newStats = { ...stats, [currentDeck.id]: { lastPracticed: Date.now(), lastScore: score } };\n                        saveStats(newStats);\n                        setCurrentScreen('results');\n                    }} onBack={() => setCurrentScreen('modes')} />;\n                }\n                if (currentScreen === 'results') {\n                    return (\n                        <div className=\"screen\">\n                            <h2>Session complete</h2>\n                            <div className=\"results-score\">100%</div>\n                            <div className=\"results-sub\">Great job!</div>\n                            <button className=\"primary-btn accent\" onClick={() => setCurrentScreen('modes')}>Practice again</button>\n                            <button className=\"primary-btn\" onClick={() => setCurrentScreen('decks')}>Back to decks</button>\n                        </div>\n                    );\n                }\n            };\n\n            return renderScreen();\n        };\n\n        // PracticeScreen Component\n        const PracticeScreen = ({ deck, mode, direction, langs, currentLang, onComplete, onBack }) => {\n            const [cardIdx, setCardIdx] = useState(0);\n            const [scored, setScored] = useState({});\n            const [cards, setCards] = useState(() => deck.cards.map((c, i) => ({ ...c, _origIdx: i })).sort(() => Math.random() - 0.5));\n\n            const sides = (card) => direction === 'front' ? { prompt: card.front, answer: card.back } : { prompt: card.back, answer: card.front };\n            const card = cards[cardIdx];\n            const { prompt, answer } = sides(card);\n            const progress = Math.round((Object.keys(scored).length / deck.cards.length) * 100);\n\n            if (mode === 'matching') {\n                return <MatchingGame deck={deck} direction={direction} onComplete={onComplete} onBack={onBack} />;\n            }\n\n            return (\n                <div className=\"screen\">\n                    <button className=\"back-btn\" onClick={onBack}>← back</button>\n                    <div className=\"progress-row\">\n                        <span className=\"progress-label\">{cardIdx + 1} / {cards.length}</span>\n                        <div className=\"score-bar-wrap\"><div className=\"score-bar\" style={{width: `${progress}%`}}></div></div>\n                    </div>\n                    <div className=\"flashcard\">\n                        <div className=\"card-word\">{prompt}</div>\n                        <div className=\"card-hint\">{mode === 'multiple' ? 'Choose the correct translation' : 'Type the translation'}</div>\n                    </div>\n                    {mode === 'multiple' && (\n                        <div>\n                            {[answer, ...deck.cards.filter(c => sides(c).answer !== answer).map(c => sides(c).answer).sort(() => Math.random() - 0.5).slice(0, 3)].sort(() => Math.random() - 0.5).map((ans, i) => (\n                                <button key={i} className=\"choice-btn\" onClick={() => {\n                                    setScored({ ...scored, [card._origIdx]: ans === answer });\n                                    if (cardIdx < cards.length - 1) setCardIdx(cardIdx + 1);\n                                    else onComplete(100);\n                                }}>{ans}</button>\n                            ))}\n                        </div>\n                    )}\n                </div>\n            );\n        };\n\n        // MatchingGame Component\n        const MatchingGame = ({ deck, direction, onComplete, onBack }) => {\n            const sides = (card) => direction === 'front' ? { prompt: card.front, answer: card.back } : { prompt: card.back, answer: card.front };\n            const [cards, setCards] = useState(() => {\n                const all = [];\n                deck.cards.forEach((card, idx) => {\n                    const s = sides(card);\n                    all.push({ id: `p${idx}`, text: s.prompt, pair: `a${idx}`, type: 'prompt' });\n                    all.push({ id: `a${idx}`, text: s.answer, pair: `p${idx}`, type: 'answer' });\n                });\n                return all.sort(() => Math.random() - 0.5);\n            });\n            const [selected, setSelected] = useState(null);\n            const [matched, setMatched] = useState(new Set());\n            const [score, setScore] = useState(0);\n\n            const handleCardClick = (card) => {\n                if (matched.has(card.id)) return;\n                if (!selected) {\n                    setSelected(card);\n                } else if (selected.id === card.id) {\n                    setSelected(null);\n                } else if (selected.pair === card.id) {\n                    setMatched(new Set([...matched, selected.id, card.id]));\n                    setScore(score + 1);\n                    setSelected(null);\n                    if (matched.size + 2 === cards.length) {\n                        setTimeout(() => onComplete(100), 500);\n                    }\n                } else {\n                    setSelected(card);\n                }\n            };\n\n            return (\n                <div className=\"screen\">\n                    <button className=\"back-btn\" onClick={onBack}>← back</button>\n                    <h2>Matching Game</h2>\n                    <div className=\"progress-row\">\n                        <span className=\"progress-label\">Matches: {score} / {deck.cards.length}</span>\n                        <div className=\"score-bar-wrap\"><div className=\"score-bar\" style={{width: `${(score / deck.cards.length) * 100}%`}}></div></div>\n                    </div>\n                    <div className=\"match-grid\">\n                        {cards.map(card => (\n                            <div\n                                key={card.id}\n                                className={`match-card ${matched.has(card.id) ? 'matched' : selected?.id === card.id ? 'selected' : ''}`}\n                                onClick={() => handleCardClick(card)}\n                            >\n                                {card.text}\n                            </div>\n                        ))}\n                    </div>\n                </div>\n            );\n        };\n\n        // Render the app\n        ReactDOM.render(<App />, document.getElementById('root'));\n    <\/script>\n</body>\n</html>
